<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>学习进度表</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f5f7fa;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 15px 12px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  width: 100%;
  overflow-x: auto;
}

.calendar-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -4px;
  padding: 0 4px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, minmax(40px, 1fr));
  gap: 4px;
  margin-top: 10px;
  min-width: 280px;
}

.day {
  aspect-ratio: 1;
  text-align: center;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
  font-weight: 500;
}

.day:hover { transform: scale(1.05); }

.full { background: #4caf50; color: white; }
.partial { background: #ff9800; color: white; }
.empty { background: #e8e8e8; color: #666; }

.header {
  font-weight: bold;
  background: #d0d0d0;
  color: #333;
  cursor: default;

  /* ⭐关键修复：居中 */
  display: flex;
  align-items: center;
  justify-content: center;
}

.today {
  border: 2px solid #2196f3;
  font-weight: bold;
}

/* 🇯🇵 节假日 */
.holiday {
  background: #ffebee !important;
  color: #d32f2f !important;
  font-weight: bold;
}

.task-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  padding: 8px;
  border-radius: 10px;
}

.task-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.task-text {
  font-size: 15px;
  word-break: break-word;
  flex: 1;
  cursor: pointer;
}

.task-text.done {
  text-decoration: line-through;
  color: #999;
}

.delete-task {
  background: #ff4444;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 5px 12px;
  cursor: pointer;
}

.input-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.input-group input {
  flex: 2;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 12px;
}

.input-group select {
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 12px;
}

.input-group button {
  padding: 12px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 12px;
}

</style>
</head>

<body>

<div class="card">
  <h3>📘 学习进度表</h3>
</div>

<div class="card">
  <div class="calendar-wrapper">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div class="card">
  <h4 id="taskTitle">任务</h4>
  <div id="taskList"></div>
</div>

<div class="card">
  <div class="input-group">
    <input id="taskInput" placeholder="输入任务..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="rangeSelect">
      <option value="1">今天</option>
      <option value="3">3天</option>
      <option value="7">7天</option>
    </select>
    <button onclick="addTask()">添加</button>
  </div>
</div>

<script>

let tasks = [];
let history = {};
let holidays = {};
let selectedDate = getDateStr(new Date());

function getDateStr(d){
  return d.toISOString().split('T')[0];
}

/* ================= 节假日 ================= */
async function loadHolidays(){
  const res = await fetch('https://holidays-jp.github.io/api/v1/date.json');
  holidays = await res.json();
}

/* ================= 添加任务（带groupId） ================= */
function addTask(){
  const text = document.getElementById("taskInput").value.trim();
  const range = +document.getElementById("rangeSelect").value;

  if(!text) return;

  const groupId = Date.now();

  for(let i=0;i<range;i++){
    const d = new Date();
    d.setDate(d.getDate()+i);

    tasks.push({
      id: groupId + '-' + i,
      groupId,
      text,
      date: getDateStr(d),
      done:false
    });
  }

  save();
  renderAll();
}

/* ================= 删除（升级版） ================= */
function deleteTask(id){

  const task = tasks.find(t=>t.id===id);
  if(!task) return;

  const mode = confirm("删除任务？\n确定=删除整个任务\n取消=只删除当天");

  if(mode){
    tasks = tasks.filter(t=>t.groupId !== task.groupId);
  }else{
    tasks = tasks.filter(t=>t.id !== id);
  }

  save();
  renderAll();
}

/* ================= 切换 ================= */
function toggleTask(id){
  const t = tasks.find(t=>t.id===id);
  if(t) t.done = !t.done;
  save();
  renderAll();
}

/* ================= 保存 ================= */
function save(){
  localStorage.setItem('study', JSON.stringify({tasks}));
}

/* ================= 加载 ================= */
function load(){
  const d = localStorage.getItem('study');
  if(d) tasks = JSON.parse(d).tasks || [];
}

/* ================= 任务 ================= */
function getTasks(date){
  return tasks.filter(t=>t.date===date);
}

function renderTasks(){
  const list = getTasks(selectedDate);
  const el = document.getElementById("taskList");

  if(list.length===0){
    el.innerHTML="无任务";
    return;
  }

  el.innerHTML = list.map(t=>`
    <div class="task-item">
      <div class="task-left">
        <input type="checkbox" ${t.done?'checked':''} onclick="toggleTask('${t.id}')">
        <span onclick="toggleTask('${t.id}')" class="task-text ${t.done?'done':''}">${t.text}</span>
      </div>
      <button class="delete-task" onclick="deleteTask('${t.id}')">删</button>
    </div>
  `).join('');
}

/* ================= 日历 ================= */
function renderCalendar(){
  const cal = document.getElementById("calendar");
  const now = new Date();

  const y = now.getFullYear();
  const m = now.getMonth();

  cal.innerHTML = "";

  const week = ['日','一','二','三','四','五','六'];

  week.forEach(w=>{
    const d=document.createElement("div");
    d.className="day header";
    d.innerText=w;
    cal.appendChild(d);
  });

  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let i=1;i<=days;i++){
    const d=new Date(y,m,i);
    const key=getDateStr(d);

    const div=document.createElement("div");

    const isHoliday = holidays[key];

    div.className = "day " +
      (isHoliday?"holiday ":"") +
      (key===getDateStr(new Date())?"today ":"") +
      (getTasks(key).some(t=>t.done)?"full":"empty");

    div.innerText=i;

    div.onclick=()=>{
      selectedDate=key;
      renderTasks();
    };

    cal.appendChild(div);
  }
}

function renderAll(){
  renderCalendar();
  renderTasks();
}

/* ================= init ================= */
(async function(){
  await loadHolidays();
  load();
  renderAll();
})();

</script>
</body>
</html>
