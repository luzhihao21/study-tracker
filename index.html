<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习进度表</title>

<style>
body {font-family: Arial;margin:15px;background:#f5f5f5;}
button {padding:10px;border:none;border-radius:8px;background:#007bff;color:#fff;margin:2px;}
.card {background:#fff;padding:12px;border-radius:10px;margin-top:12px;}
.done {text-decoration:line-through;color:gray;}
.task-row {display:flex;justify-content:space-between;margin:8px 0;}
.calendar {display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;}
.day {aspect-ratio:1;text-align:center;font-size:12px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.full {background:#4caf50;color:white;}
.partial {background:#ff9800;color:white;}
.empty {background:#ddd;}
.header {font-weight:bold;}
.today {border:2px solid #2196f3;}
.loading {text-align:center;color:#666;padding:20px;}
</style>
</head>

<body>

<h2>📘 学习进度</h2>

<div class="card">
  <button onclick="login()">Google登录</button>
  <button onclick="logout()">退出</button>
  <div id="user">未登录</div>
</div>

<div class="card">
🔥 连续学习：<b id="streak">0</b> 天
</div>

<div class="card">
<input id="taskInput" placeholder="输入任务">
<select id="rangeSelect">
<option value="1">今天</option>
<option value="3">最近3天</option>
<option value="7">最近7天</option>
<option value="999">每天</option>
</select>
<button onclick="addTask()">添加任务</button>
</div>

<div class="card">
<h4 id="taskTitle">📋 今日任务</h4>
<div id="taskList"></div>
</div>

<div class="card">
<h4 id="calendarTitle"></h4>
<div class="calendar" id="calendar"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ===== Firebase =====
const firebaseConfig = {
  apiKey: "AIzaSyBJOy5FUYZ35McTPje8uQfwmL4UW0hCVjg",
  authDomain: "study-tracker-f8e6b.firebaseapp.com",
  projectId: "study-tracker-f8e6b",
  storageBucket: "study-tracker-f8e6b.firebasestorage.app",
  messagingSenderId: "816852795711",
  appId: "1:816852795711:web:dd2a8c6c2bd9773d8d138a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ===== 数据 =====
let tasks = [];
let history = {};
let selectedDate = getDateStr(new Date());
let isLoading = true;  // 添加加载状态标记

// ===== 日期 =====
function getDateStr(d){
  return d.toISOString().split("T")[0];
}

// ===== 登录（redirect版）=====
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").textContent = "已登录：" + user.email;
    loadFromCloud();  // 登录后加载数据
  }else{
    document.getElementById("user").textContent = "未登录";
    // 未登录时清空数据
    tasks = [];
    history = {};
    isLoading = false;
    renderAll();
  }
});

// ===== 云存储 =====
function saveToCloud(){
  const user = auth.currentUser;
  if(!user) return;

  db.collection("users").doc(user.uid).set({
    tasks,
    history
  }).catch(err => console.error("保存失败:", err));
}

function loadFromCloud(){
  const user = auth.currentUser;
  if(!user) return;

  isLoading = true;
  showLoadingState(true);
  
  db.collection("users").doc(user.uid).get()
    .then(doc=>{
      if(doc.exists){
        const data = doc.data();
        tasks = data.tasks || [];
        history = data.history || {};
      } else {
        // 新用户，初始化空数据
        tasks = [];
        history = {};
      }
      isLoading = false;
      showLoadingState(false);
      renderAll();
    })
    .catch(err => {
      console.error("加载失败:", err);
      isLoading = false;
      showLoadingState(false);
      renderAll();
    });
}

// 显示/隐藏加载状态
function showLoadingState(show) {
  const taskList = document.getElementById("taskList");
  const calendar = document.getElementById("calendar");
  if (show) {
    taskList.innerHTML = '<div class="loading">加载中...</div>';
    calendar.innerHTML = '<div class="loading">加载中...</div>';
  }
}

// ===== 添加任务 =====
function addTask(){
  const text = document.getElementById("taskInput").value;
  const range = parseInt(document.getElementById("rangeSelect").value);
  if(!text) return;

  for(let i=0;i<range;i++){
    const d = new Date();
    d.setDate(d.getDate()+i);

    // 检查是否已有相同任务（可选，避免重复）
    const exists = tasks.some(t => t.text === text && t.date === getDateStr(d));
    if (!exists) {
      tasks.push({
        text,
        date:getDateStr(d),
        done:false
      });
    }
  }

  save();
  document.getElementById("taskInput").value = ""; // 清空输入框
}

// ===== 获取任务 =====
function getTasksByDate(date){
  return tasks.filter(t=>t.date===date);
}

// ===== 切换任务 =====
function toggleTask(index){
  const list = getTasksByDate(selectedDate);
  if (list[index]) {
    list[index].done = !list[index].done;
    updateHistory(selectedDate);
    save();
  }
}

// ===== 更新history =====
function updateHistory(date){
  const list = getTasksByDate(date);
  if(list.length===0) return;

  const doneCount = list.filter(t=>t.done).length;
  const ratio = doneCount / list.length;

  if(ratio===1) history[date]=1;
  else if(ratio>0) history[date]=0.5;
  else delete history[date];
}

// ===== 渲染任务 =====
function renderTasks(){
  const listEl = document.getElementById("taskList");
  if (!listEl) return;
  listEl.innerHTML="";

  const list = getTasksByDate(selectedDate);
  const d = new Date(selectedDate);
  const todayStr = getDateStr(new Date());

  if(selectedDate === todayStr){
    document.getElementById("taskTitle").textContent = "📋 今日任务";
  }else{
    document.getElementById("taskTitle").textContent =
      `📋 ${d.getMonth()+1}月${d.getDate()}日任务`;
  }

  if (list.length === 0) {
    const emptyDiv = document.createElement("div");
    emptyDiv.textContent = "✨ 暂无任务，添加一个吧";
    emptyDiv.style.color = "#999";
    emptyDiv.style.padding = "10px";
    listEl.appendChild(emptyDiv);
    return;
  }

  list.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="task-row";

    const left = document.createElement("div");

    const cb = document.createElement("input");
    cb.type="checkbox";
    cb.checked = t.done;
    cb.onclick=()=>toggleTask(i);

    const span = document.createElement("span");
    span.textContent = t.text;
    if(t.done) span.className="done";

    left.appendChild(cb);
    left.appendChild(span);
    div.appendChild(left);
    listEl.appendChild(div);
  });
}

// ===== streak =====
function renderStreak(){
  let count=0;
  let d=new Date();

  while(true){
    const key=getDateStr(d);
    if(history[key] === 1){  // 只有完全完成才算连续
      count++;
      d.setDate(d.getDate()-1);
    }else break;
  }

  const streakEl = document.getElementById("streak");
  if (streakEl) streakEl.textContent = count;
}

// ===== 日历 =====
function renderCalendar(){
  const cal=document.getElementById("calendar");
  if (!cal) return;
  cal.innerHTML="";

  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();

  const titleEl = document.getElementById("calendarTitle");
  if (titleEl) titleEl.textContent = `${month+1}月学习进度`;

  const week=["日","一","二","三","四","五","六"];
  week.forEach(w=>{
    const d=document.createElement("div");
    d.textContent=w;
    d.className="day header";
    cal.appendChild(d);
  });

  const firstDay=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let i=1;i<=days;i++){
    const d=new Date(year,month,i);
    const key=getDateStr(d);

    const div=document.createElement("div");
    div.className="day";
    div.textContent=i;

    if(history[key]===1) div.classList.add("full");
    else if(history[key]===0.5) div.classList.add("partial");
    else div.classList.add("empty");

    if(key===getDateStr(new Date())){
      div.classList.add("today");
    }

    div.onclick=()=>{
      selectedDate = key;
      renderTasks();
    };

    cal.appendChild(div);
  }
}

// ===== 保存 =====
function save(){
  saveToCloud();
  renderAll();
}

// ===== 渲染 =====
function renderAll(){
  // 只有在非加载状态或已加载完成时才渲染
  if (isLoading) return;
  renderTasks();
  renderStreak();
  renderCalendar();
}

// ===== 初始化：先渲染空状态，等待登录回调加载数据 =====
// 不调用 renderAll()，让 onAuthStateChanged 处理
renderAll();  // 初始渲染空数据（未登录状态）

</script>

</body>
</html>
