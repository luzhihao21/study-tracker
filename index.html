<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习进度表</title>

<style>
body {font-family: Arial;margin:15px;background:#f5f5f5;max-width:600px;margin:0 auto;padding:15px;}
button {padding:10px 15px;border:none;border-radius:8px;background:#007bff;color:#fff;margin:2px;cursor:pointer;}
.card {background:#fff;padding:12px;border-radius:10px;margin-top:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.done {text-decoration:line-through;color:gray;}
.task-row {display:flex;justify-content:space-between;align-items:center;margin:8px 0;padding:5px;border-radius:5px;}
.task-row:hover {background:#f0f0f0;}
.calendar {display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;}
.day {aspect-ratio:1;text-align:center;font-size:12px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s;}
.day:hover {transform:scale(1.05);}
.full {background:#4caf50;color:white;}
.partial {background:#ff9800;color:white;}
.empty {background:#e0e0e0;}
.header {font-weight:bold;background:#ddd;cursor:default;}
.header:hover {transform:none;}
.today {border:2px solid #2196f3;font-weight:bold;}
.delete-btn {background:#ff4444;color:white;border:none;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:12px;}
.delete-btn:hover {background:#cc0000;}
.input-group {display:flex;gap:8px;flex-wrap:wrap;}
.input-group input {flex:2;padding:8px;border:1px solid #ddd;border-radius:6px;}
.input-group select {padding:8px;border:1px solid #ddd;border-radius:6px;}
.stats {display:flex;justify-content:space-around;text-align:center;}
.stats div {flex:1;}
.stat-number {font-size:24px;font-weight:bold;color:#007bff;}
.export-buttons {display:flex;gap:5px;margin-top:10px;}
</style>
</head>

<body>

<h2>📘 学习进度表</h2>

<div class="card">
  <div style="color:#28a745;margin-bottom:8px;">💾 数据自动保存在浏览器中，清除缓存会丢失</div>
  <div class="export-buttons">
    <button onclick="exportData()" style="background:#28a745;">📤 导出备份</button>
    <button onclick="importData()" style="background:#ff9800;">📥 导入备份</button>
    <button onclick="clearAllData()" style="background:#dc3545;" id="clearBtn">🗑️ 清空所有</button>
  </div>
  <input type="file" id="importFile" style="display:none;" accept=".json" onchange="handleImport(event)">
</div>

<div class="card stats">
  <div>
    <div class="stat-number" id="totalTasks">0</div>
    <div>总任务</div>
  </div>
  <div>
    <div class="stat-number" id="completedTasks">0</div>
    <div>已完成</div>
  </div>
  <div>
    <div class="stat-number" id="streak">0</div>
    <div>连续学习</div>
  </div>
</div>

<div class="card">
  <div class="input-group">
    <input id="taskInput" placeholder="输入学习任务..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="rangeSelect">
      <option value="1">📅 今天</option>
      <option value="3">📆 最近3天</option>
      <option value="7">📆 最近7天</option>
      <option value="999">📅 每天</option>
    </select>
    <button onclick="addTask()">➕ 添加</button>
  </div>
</div>

<div class="card">
  <h4 id="taskTitle">📋 今日任务</h4>
  <div id="taskList"></div>
</div>

<div class="card">
  <h4 id="calendarTitle"></h4>
  <div class="calendar" id="calendar"></div>
</div>

<script>
// ===== 数据存储 =====
let tasks = [];      // 所有任务 {id, text, date, done}
let history = {};    // 日期完成状态 { "2025-01-01": 1 或 0.5 }
let selectedDate = getDateStr(new Date());

// ===== 工具函数 =====
function getDateStr(d) {
  return d.toISOString().split("T")[0];
}

// ===== 保存到 localStorage =====
function saveToLocal() {
  const data = {
    tasks: tasks,
    history: history,
    lastUpdate: new Date().toISOString()
  };
  localStorage.setItem('study_tracker_data', JSON.stringify(data));
  console.log('✅ 已保存，任务数:', tasks.length);
}

// ===== 从 localStorage 加载 =====
function loadFromLocal() {
  const saved = localStorage.getItem('study_tracker_data');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      tasks = data.tasks || [];
      history = data.history || {};
      console.log('📦 加载成功，任务数:', tasks.length);
      return true;
    } catch(e) {
      console.error('加载失败:', e);
    }
  }
  return false;
}

// ===== 导出数据 =====
function exportData() {
  const data = {
    tasks: tasks,
    history: history,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `学习记录_${getDateStr(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert('✅ 备份已导出！');
}

// ===== 导入数据 =====
function importData() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      tasks = data.tasks || [];
      history = data.history || {};
      saveToLocal();
      renderAll();
      alert('✅ 导入成功！');
    } catch(err) {
      alert('❌ 文件格式错误');
    }
  };
  reader.readAsText(file);
  document.getElementById('importFile').value = '';
}

// ===== 清空所有数据 =====
function clearAllData() {
  if (confirm('⚠️ 确定要清空所有学习记录吗？此操作不可恢复！')) {
    tasks = [];
    history = {};
    saveToLocal();
    renderAll();
    alert('已清空');
  }
}

// ===== 添加任务 =====
function addTask() {
  const text = document.getElementById("taskInput").value.trim();
  const range = parseInt(document.getElementById("rangeSelect").value);
  
  if (!text) {
    alert('请输入任务内容');
    return;
  }

  let added = 0;
  
  for (let i = 0; i < range; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const dateStr = getDateStr(d);
    
    // 避免重复添加相同的未完成任务
    const exists = tasks.some(t => t.text === text && t.date === dateStr && !t.done);
    
    if (!exists) {
      tasks.push({
        id: Date.now() + '-' + i + '-' + Math.random().toString(36).substr(2, 6),
        text: text,
        date: dateStr,
        done: false,
        createdAt: Date.now()
      });
      added++;
    }
  }

  if (added > 0) {
    saveToLocal();
    renderAll();
    document.getElementById("taskInput").value = '';
    document.getElementById("taskInput").focus();
  } else if (range === 1) {
    alert('今天已经有这个任务了');
  } else {
    alert('所选日期中已有相同的任务');
  }
}

// ===== 删除任务 =====
function deleteTask(taskId) {
  const index = tasks.findIndex(t => t.id === taskId);
  if (index !== -1) {
    const date = tasks[index].date;
    tasks.splice(index, 1);
    updateHistory(date);
    saveToLocal();
    renderAll();
  }
}

// ===== 获取某天的任务 =====
function getTasksByDate(date) {
  return tasks.filter(t => t.date === date);
}

// ===== 切换任务状态 =====
function toggleTask(taskId) {
  const taskIndex = tasks.findIndex(t => t.id === taskId);
  if (taskIndex !== -1) {
    tasks[taskIndex].done = !tasks[taskIndex].done;
    updateHistory(tasks[taskIndex].date);
    saveToLocal();
    renderTasks(); // 只刷新任务列表，更快
    renderStats(); // 刷新统计数据
  }
}

// ===== 更新某天的完成历史 =====
function updateHistory(date) {
  const list = getTasksByDate(date);
  if (list.length === 0) {
    delete history[date];
    return;
  }

  const doneCount = list.filter(t => t.done).length;
  const ratio = doneCount / list.length;

  if (ratio === 1) {
    history[date] = 1;
  } else if (ratio > 0) {
    history[date] = 0.5;
  } else {
    delete history[date];
  }
}

// ===== 渲染任务列表 =====
function renderTasks() {
  const listEl = document.getElementById("taskList");
  if (!listEl) return;
  
  const list = getTasksByDate(selectedDate);
  const d = new Date(selectedDate);
  const todayStr = getDateStr(new Date());

  if (selectedDate === todayStr) {
    document.getElementById("taskTitle").innerHTML = "📋 今日任务";
  } else {
    document.getElementById("taskTitle").innerHTML = `📋 ${d.getMonth()+1}月${d.getDate()}日任务`;
  }

  if (list.length === 0) {
    listEl.innerHTML = '<div style="color:#999;padding:20px;text-align:center;">✨ 暂无任务，点击上方"添加任务"</div>';
    return;
  }

  listEl.innerHTML = '';
  
  list.forEach(task => {
    const div = document.createElement("div");
    div.className = "task-row";

    const left = document.createElement("div");
    left.style.display = "flex";
    left.style.alignItems = "center";
    left.style.gap = "10px";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = task.done;
    cb.style.width = "18px";
    cb.style.height = "18px";
    cb.style.cursor = "pointer";
    cb.onclick = () => toggleTask(task.id);

    const span = document.createElement("span");
    span.textContent = task.text;
    if (task.done) span.className = "done";
    span.style.flex = "1";
    span.style.cursor = "pointer";
    span.onclick = () => toggleTask(task.id);

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "删除";
    deleteBtn.className = "delete-btn";
    deleteBtn.onclick = () => deleteTask(task.id);

    left.appendChild(cb);
    left.appendChild(span);
    div.appendChild(left);
    div.appendChild(deleteBtn);
    listEl.appendChild(div);
  });
}

// ===== 统计数据 =====
function renderStats() {
  const total = tasks.length;
  const completed = tasks.filter(t => t.done).length;
  document.getElementById("totalTasks").textContent = total;
  document.getElementById("completedTasks").textContent = completed;
  
  // 计算连续学习天数
  let streak = 0;
  let d = new Date();
  
  while (true) {
    const key = getDateStr(d);
    if (history[key] === 1) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  document.getElementById("streak").textContent = streak;
}

// ===== 渲染日历 =====
function renderCalendar() {
  const cal = document.getElementById("calendar");
  if (!cal) return;
  cal.innerHTML = "";

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById("calendarTitle").innerHTML = `📅 ${year}年 ${month+1}月`;

  const week = ["日", "一", "二", "三", "四", "五", "六"];
  week.forEach(w => {
    const d = document.createElement("div");
    d.textContent = w;
    d.className = "day header";
    cal.appendChild(d);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();

  // 补全上月空白
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement("div");
    cal.appendChild(empty);
  }

  // 渲染当月每一天
  for (let i = 1; i <= days; i++) {
    const d = new Date(year, month, i);
    const key = getDateStr(d);

    const div = document.createElement("div");
    div.className = "day";
    div.textContent = i;

    if (history[key] === 1) div.classList.add("full");
    else if (history[key] === 0.5) div.classList.add("partial");
    else div.classList.add("empty");

    if (key === getDateStr(new Date())) {
      div.classList.add("today");
    }

    div.onclick = (function(dateKey) {
      return function() {
        selectedDate = dateKey;
        renderTasks();
        // 高亮当前选中的日期
        document.querySelectorAll('.calendar .day').forEach(el => {
          el.style.border = '';
        });
        this.style.border = '2px solid #007bff';
      };
    })(key);

    cal.appendChild(div);
  }
}

// ===== 全部渲染 =====
function renderAll() {
  renderTasks();
  renderStats();
  renderCalendar();
}

// ===== 页面启动 =====
console.log('🚀 应用启动');
loadFromLocal();
renderAll();

// 如果还没有数据，添加示例任务
if (tasks.length === 0) {
  console.log('📝 添加示例任务');
  const today = getDateStr(new Date());
  tasks.push({
    id: 'example-1',
    text: '📖 学习 HTML',
    date: today,
    done: false,
    createdAt: Date.now()
  });
  tasks.push({
    id: 'example-2',
    text: '🎨 学习 CSS',
    date: today,
    done: false,
    createdAt: Date.now()
  });
  saveToLocal();
  renderAll();
}
</script>

</body>
</html>
