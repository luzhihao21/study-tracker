<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>学习进度表 · 日本节日版</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f5f7fa;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 15px 12px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  width: 100%;
  overflow-x: auto;
}

.calendar-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -4px;
  padding: 0 4px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, minmax(40px, 1fr));
  gap: 4px;
  margin-top: 10px;
  min-width: 280px;
}

@media (max-width: 480px) {
  body {
    padding: 8px;
  }
  .card {
    padding: 12px 10px;
  }
  .calendar {
    grid-template-columns: repeat(7, minmax(36px, 1fr));
    gap: 3px;
  }
  .day {
    font-size: 11px;
  }
  .task-text {
    font-size: 14px;
  }
  .delete-task {
    padding: 4px 10px;
    font-size: 11px;
  }
  .stat-number {
    font-size: 22px;
  }
  .input-group input,
  .input-group select,
  .input-group button {
    padding: 10px;
  }
  .holiday-label {
    font-size: 7px;
    bottom: 1px;
  }
}

@media (max-width: 380px) {
  .calendar {
    grid-template-columns: repeat(7, minmax(32px, 1fr));
    gap: 2px;
  }
  .day {
    font-size: 10px;
  }
  .holiday-label {
    font-size: 6px;
  }
}

/* 热力图单元格样式 */
.day {
  aspect-ratio: 1;
  text-align: center;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
  font-weight: 500;
  background: #e8e8e8;
  color: #333;
  font-size: 15px;
  position: relative;
  overflow: hidden;
}
.day:hover {
  transform: scale(1.05);
}

/* 节假日粉红色背景 */
.day.holiday {
  background: #ffb7c5 !important;
}

/* 图标样式 - 笑脸和太极图（满足任务条件后取代数字） */
.day.icon-smile {
  background: #4caf50 !important;
  font-size: 0;
}
.day.icon-smile::before {
  content: "😊";
  font-size: 24px;
  display: block;
  line-height: 1;
}

.day.icon-taiji {
  background: #4caf50 !important;
  font-size: 0;
}
.day.icon-taiji::before {
  content: "☯";
  font-size: 24px;
  display: block;
  transform: rotate(90deg);
  line-height: 1;
}

/* 普通完成/未完成底色 */
.day.full {
  background: #4caf50;
  color: white;
}
.day.partial {
  background: #ff9800;
  color: white;
}
.day.empty {
  background: #e8e8e8;
  color: #666;
}

/* 星期表头强制居中 */
.day.header {
  background: #d0d0d0;
  cursor: default;
  color: #333;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.day.header:hover {
  transform: none;
}

.today {
  border: 2px solid #2196f3;
  font-weight: bold;
}

.month-title {
  text-align: center;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #333;
}

/* 节假日小标签 */
.holiday-label {
  position: absolute;
  bottom: 2px;
  left: 0;
  right: 0;
  font-size: 7px;
  color: #b13b4a;
  font-weight: bold;
  background: rgba(255,255,200,0.7);
  border-radius: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 2px;
  pointer-events: none;
  text-align: center;
}

/* 任务列表样式 */
.task-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  padding: 8px;
  border-radius: 10px;
  transition: background 0.2s;
  background: #fefefe;
  border-bottom: 1px solid #eee;
}
.task-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.task-left input[type="checkbox"] {
  width: 20px;
  height: 20px;
  cursor: pointer;
}
.task-text {
  font-size: 15px;
  word-break: break-word;
  flex: 1;
  cursor: pointer;
}
.task-text.done {
  text-decoration: line-through;
  color: #999;
}
.delete-task {
  background: #ff4444;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 12px;
  transition: 0.1s;
}
.delete-task:hover {
  background: #cc0000;
}
.empty-tasks {
  text-align: center;
  color: #999;
  padding: 25px;
}
.input-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.input-group input {
  flex: 2;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 12px;
  font-size: 14px;
}
.input-group select {
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 12px;
}
.input-group button {
  padding: 12px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
.stats-container {
  display: flex;
  justify-content: space-around;
  text-align: center;
  gap: 10px;
}
.stat-card {
  flex: 1;
  background: #f8f9fa;
  padding: 12px;
  border-radius: 14px;
}
.stat-number {
  font-size: 28px;
  font-weight: bold;
  color: #007bff;
}
.stat-label {
  font-size: 12px;
  color: #666;
}
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}
h2 {
  margin: 0;
  font-size: 24px;
}
.settings-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
}
.settings-panel {
  position: fixed;
  top: 0;
  right: -300px;
  width: 280px;
  height: 100%;
  background: white;
  box-shadow: -2px 0 10px rgba(0,0,0,0.1);
  transition: right 0.3s ease;
  z-index: 1000;
  padding: 20px;
}
.settings-panel.show {
  right: 0;
}
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: none;
}
.overlay.show {
  display: block;
}
.close-settings {
  position: absolute;
  top: 10px;
  right: 15px;
  background: none;
  border: none;
  font-size: 24px;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  z-index: 1100;
  transition: transform 0.3s;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="header-bar">
  <h2>📘 学习进度</h2>
  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
</div>

<!-- 设置面板 -->
<div class="overlay" id="overlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" onclick="toggleSettings()">✕</button>
  <h4>⚙️ データ管理</h4>
  <button onclick="exportData()" style="background:#28a745; margin-bottom:8px; width:100%;">📤 导出备份</button>
  <button onclick="importData()" style="background:#ff9800; margin-bottom:8px; width:100%;">📥 导入备份</button>
  <button onclick="clearAllData()" style="background:#dc3545; width:100%;">🗑️ 清空所有</button>
</div>
<input type="file" id="importFile" style="display:none;" accept=".json">

<!-- 热力图区域 -->
<div class="card">
  <div class="month-title" id="calendarTitle"></div>
  <div class="calendar-wrapper">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<!-- 今日任务 / 特定日期任务区域 -->
<div class="card">
  <h4 id="taskTitle">📋 今日任务</h4>
  <div id="taskList"></div>
</div>

<!-- 添加任务 -->
<div class="card">
  <div class="input-group">
    <input id="taskInput" placeholder="学習タスクを入力..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="rangeSelect">
      <option value="1">今日だけ</option>
      <option value="3">3日間</option>
      <option value="7">7日間</option>
      <option value="999">毎日</option>
    </select>
    <button onclick="addTask()">追加</button>
  </div>
</div>

<!-- 统计 -->
<div class="card">
  <div class="stats-container">
    <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">総タスク</div></div>
    <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label">完了済み</div></div>
    <div class="stat-card"><div class="stat-number" id="streak">0</div><div class="stat-label">連続学習</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ======================== 日本节假日数据 (2024-2026简单覆盖, 可扩展) ========================
// 格式: "YYYY-MM-DD": "節日名"
const jpHolidays = {
  // 2024年
  "2024-01-01": "元日",
  "2024-01-08": "成人の日",
  "2024-02-11": "建国記念の日",
  "2024-02-23": "天皇誕生日",
  "2024-03-20": "春分の日",
  "2024-04-29": "昭和の日",
  "2024-05-03": "憲法記念日",
  "2024-05-04": "みどりの日",
  "2024-05-05": "こどもの日",
  "2024-07-15": "海の日",
  "2024-08-11": "山の日",
  "2024-09-16": "敬老の日",
  "2024-09-22": "秋分の日",
  "2024-10-14": "スポーツの日",
  "2024-11-03": "文化の日",
  "2024-11-23": "勤労感謝の日",
  // 2025年
  "2025-01-01": "元日",
  "2025-01-13": "成人の日",
  "2025-02-11": "建国記念の日",
  "2025-02-23": "天皇誕生日",
  "2025-03-20": "春分の日",
  "2025-04-29": "昭和の日",
  "2025-05-03": "憲法記念日",
  "2025-05-04": "みどりの日",
  "2025-05-05": "こどもの日",
  "2025-07-21": "海の日",
  "2025-08-11": "山の日",
  "2025-09-15": "敬老の日",
  "2025-09-23": "秋分の日",
  "2025-10-13": "スポーツの日",
  "2025-11-03": "文化の日",
  "2025-11-23": "勤労感謝の日",
  // 2026年
  "2026-01-01": "元日",
  "2026-01-12": "成人の日",
  "2026-02-11": "建国記念の日",
  "2026-02-23": "天皇誕生日",
  "2026-03-20": "春分の日",
  "2026-04-29": "昭和の日",
  "2026-05-03": "憲法記念日",
  "2026-05-04": "みどりの日",
  "2026-05-05": "こどもの日",
  "2026-07-20": "海の日",
  "2026-08-11": "山の日",
  "2026-09-21": "敬老の日",
  "2026-09-23": "秋分の日",
  "2026-10-12": "スポーツの日",
  "2026-11-03": "文化の日",
  "2026-11-23": "勤労感謝の日"
};

function getHolidayName(dateStr) {
  return jpHolidays[dateStr] || null;
}

// 数据存储
let tasks = [];
let history = {};      // 兼容旧结构，但动态基于任务计算图标状态
let selectedDate = getDateStr(new Date());

function getDateStr(d) {
  return d.toISOString().split("T")[0];
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('show');
  document.getElementById('overlay').classList.toggle('show');
}

function saveToLocal() {
  localStorage.setItem('study_tracker_data', JSON.stringify({ tasks, history }));
}

function loadFromLocal() {
  const saved = localStorage.getItem('study_tracker_data');
  if (saved) {
    const data = JSON.parse(saved);
    tasks = data.tasks || [];
    history = data.history || {};
  }
}

function exportData() {
  const data = { tasks, history };
  const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `学習記録_${getDateStr(new Date())}.json`;
  a.click();
  showToast('エクスポート完了');
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const data = JSON.parse(ev.target.result);
    tasks = data.tasks || [];
    history = data.history || {};
    saveToLocal();
    renderAll();
    showToast('インポート成功');
  };
  reader.readAsText(file);
}

function clearAllData() {
  if (confirm('⚠️ 全てのデータを削除しますか？')) {
    tasks = [];
    history = {};
    saveToLocal();
    renderAll();
    toggleSettings();
    showToast('データをクリアしました');
  }
}

// ---------- 核心状态: 根据某一天的任务计算应显示的图标准则 ----------
// 规则:
// - 当天没有任务 -> 普通无图标
// - 当天有1个任务: 完成则显示笑脸😊；未完成显示橙色背景数字
// - 当天有2个及以上任务: 
//     完成0个 -> 橙色背景数字
//     完成1个（且非全部完成） -> 太极图☯ (旋转90度)
//     完成2个及以上且全部完成 -> 笑脸😊
//     完成部分且完成数量>=1但未全部完成 -> 太极图
function getDayStatus(dateStr) {
  const dayTasks = tasks.filter(t => t.date === dateStr);
  if (dayTasks.length === 0) return { type: 'none', doneCount: 0, total: 0 };
  
  const total = dayTasks.length;
  const doneCount = dayTasks.filter(t => t.done).length;
  
  // 单个任务逻辑
  if (total === 1) {
    if (doneCount === 1) return { type: 'smile', doneCount, total };
    else return { type: 'pending', doneCount, total };
  }
  
  // 多个任务(>=2)
  if (doneCount === 0) return { type: 'pending', doneCount, total };
  if (doneCount === total) return { type: 'smile', doneCount, total };
  // 至少完成一个但不是全部完成 -> 太极
  return { type: 'taiji', doneCount, total };
}

// 更新history兼容连续学习计算
function rebuildHistory() {
  const allDates = [...new Set(tasks.map(t => t.date))];
  allDates.forEach(date => {
    const status = getDayStatus(date);
    if (status.type === 'smile') {
      history[date] = 1;
    } else if (status.type === 'taiji' || (status.type === 'pending' && status.doneCount > 0)) {
      history[date] = 0.5;
    } else if (status.type === 'pending' && status.doneCount === 0 && status.total > 0) {
      history[date] = 0.5;
    } else {
      if (history[date]) delete history[date];
    }
  });
  // 清理无任务日期
  Object.keys(history).forEach(date => {
    if (tasks.filter(t => t.date === date).length === 0) delete history[date];
  });
}

function addTask() {
  const text = document.getElementById("taskInput").value.trim();
  const range = parseInt(document.getElementById("rangeSelect").value);
  if (!text) {
    showToast("タスクを入力してください");
    return;
  }
  
  for (let i = 0; i < range; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const dateStr = getDateStr(d);
    if (!tasks.some(t => t.text === text && t.date === dateStr)) {
      tasks.push({ id: Date.now() + '-' + i + '-' + Math.random(), text, date: dateStr, done: false });
    }
  }
  rebuildHistory();
  saveToLocal();
  renderAll();
  document.getElementById("taskInput").value = '';
  showToast(range===999 ? '毎日タスクを追加' : `${range}日間タスク追加`);
}

// 删除任务进阶: 弹窗选择 删除今天及以后 / 全部删除 / 取消
function deleteTaskWithDialog(taskId) {
  const targetTask = tasks.find(t => t.id === taskId);
  if (!targetTask) return;
  
  const currentDateStr = targetTask.date;
  const taskText = targetTask.text;
  
  // 寻找相同文本的所有任务，按日期排序
  const sameTextTasks = tasks.filter(t => t.text === taskText).sort((a,b) => a.date.localeCompare(b.date));
  if (sameTextTasks.length <= 1) {
    tasks = tasks.filter(t => t.id !== taskId);
    rebuildHistory();
    saveToLocal();
    renderAll();
    showToast(`「${taskText}」を削除しました`);
    return;
  }
  
  // 找到日期 >= 当前任务日期的相同任务（今天及以后）
  const futureTasks = sameTextTasks.filter(t => t.date >= currentDateStr);
  if (futureTasks.length === 0) {
    tasks = tasks.filter(t => t.id !== taskId);
    rebuildHistory();
    saveToLocal();
    renderAll();
    showToast(`「${taskText}」を削除`);
    return;
  }
  
  // 使用原生confirm模拟三个选项: 先弹第一个询问，选择后再决定真实操作
  const choice = confirm(`「${taskText}」の削除オプション:\n\n【OK】今日以降の ${futureTasks.length}件 を削除\n【キャンセル】さらに選択肢へ`);
  if (choice) {
    // 删除今天及以后所有相同任务
    tasks = tasks.filter(t => !(t.text === taskText && t.date >= currentDateStr));
    rebuildHistory();
    saveToLocal();
    renderAll();
    showToast(`今日以降の「${taskText}」を削除しました`);
  } else {
    // 第二层选择: 全部删除 或 取消
    const delAll = confirm(`全ての「${taskText}」タスクを削除しますか？\n(全${sameTextTasks.length}件)\n\nOK → 全部削除\nキャンセル → 削除中止`);
    if (delAll) {
      tasks = tasks.filter(t => t.text !== taskText);
      rebuildHistory();
      saveToLocal();
      renderAll();
      showToast(`全ての「${taskText}」を削除しました`);
    } else {
      showToast("削除キャンセル");
    }
  }
}

function deleteTaskHandler(id) {
  deleteTaskWithDialog(id);
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) {
    task.done = !task.done;
    rebuildHistory();
    saveToLocal();
    renderAll();
  }
}

function renderTasks() {
  const list = tasks.filter(t => t.date === selectedDate);
  const container = document.getElementById('taskList');
  const todayStr = getDateStr(new Date());
  const displayDate = selectedDate === todayStr ? '📋 今日のタスク' : `📋 ${new Date(selectedDate).getMonth()+1}月${new Date(selectedDate).getDate()}日タスク`;
  document.getElementById('taskTitle').innerHTML = displayDate;
  
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-tasks">✨ タスクがありません。追加してください</div>';
    return;
  }
  container.innerHTML = list.map(task => `
    <div class="task-item">
      <div class="task-left">
        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}')">
        <span class="task-text ${task.done ? 'done' : ''}" onclick="toggleTask('${task.id}')">${escapeHtml(task.text)}</span>
      </div>
      <button class="delete-task" onclick="deleteTaskHandler('${task.id}')">削除</button>
    </div>
  `).join('');
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderStats() {
  document.getElementById('totalTasks').textContent = tasks.length;
  document.getElementById('completedTasks').textContent = tasks.filter(t => t.done).length;
  let streak = 0;
  let d = new Date();
  while (true) {
    const dateStr = getDateStr(d);
    const status = getDayStatus(dateStr);
    if (status.type === 'smile') {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  document.getElementById('streak').textContent = streak;
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  document.getElementById('calendarTitle').innerHTML = `📅 ${year}年 ${month+1}月`;
  
  const week = ['日', '月', '火', '水', '木', '金', '土'];
  cal.innerHTML = week.map(w => `<div class="day header">${w}</div>`).join('');
  
  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();
  
  for (let i = 0; i < firstDay; i++) {
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'day empty';
    cal.appendChild(emptyDiv);
  }
  
  for (let i = 1; i <= days; i++) {
    const d = new Date(year, month, i);
    const key = getDateStr(d);
    const status = getDayStatus(key);
    const holidayName = getHolidayName(key);
    const div = document.createElement('div');
    div.className = 'day';
    
    // ========== 优先处理任务图标规则 (笑脸/太极) ==========
    if (status.type === 'smile') {
      div.classList.add('icon-smile');
      div.classList.add('full');
    } else if (status.type === 'taiji') {
      div.classList.add('icon-taiji');
      div.classList.add('full');
    } else if (status.type === 'pending') {
      div.classList.add('partial');
      div.textContent = i;
    } else {
      div.classList.add('empty');
      div.textContent = i;
    }
    
    // 如果图标模式挤掉了数字，要保证标题没有多余文本
    if ((status.type === 'smile' || status.type === 'taiji') && div.textContent) {
      div.textContent = '';
    }
    
    // 添加节假日粉红背景 (优先级: 保持图标底色基础上再覆盖节假日粉红，但如果已经绿底笑脸可保留粉红叠加? 为了视觉，粉色作为节日提醒)
    if (holidayName) {
      div.classList.add('holiday');
      // 如果单元格还不是图标模式也没有数字的空白情况，需要补数字
      if (!div.textContent && !div.classList.contains('icon-smile') && !div.classList.contains('icon-taiji')) {
        div.textContent = i;
      }
      const labelSpan = document.createElement('span');
      labelSpan.className = 'holiday-label';
      labelSpan.textContent = holidayName;
      div.appendChild(labelSpan);
    }
    
    if (key === getDateStr(new Date())) div.classList.add('today');
    if (!div.classList.contains('icon-smile') && !div.classList.contains('icon-taiji') && !div.textContent) {
      div.textContent = i;
    }
    
    div.onclick = (function(k) { return () => { selectedDate = k; renderTasks(); renderCalendar(); }; })(key);
    cal.appendChild(div);
  }
}

function renderAll() {
  rebuildHistory();
  renderCalendar();
  renderTasks();
  renderStats();
}

// ========== 初始化示例任务 ==========
loadFromLocal();
if (tasks.length === 0) {
  const today = getDateStr(new Date());
  tasks.push({ id: 'demo1', text: '📖 読書', date: today, done: false });
  tasks.push({ id: 'demo2', text: '💻 プログラミング練習', date: today, done: false });
  saveToLocal();
}
rebuildHistory();
renderAll();
document.getElementById('importFile').addEventListener('change', handleImport);
</script>
