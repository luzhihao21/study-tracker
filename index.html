<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习进度表</title>

<style>
body {font-family: Arial; margin:15px; background:#f5f5f5;}
.topbar {display:flex; justify-content:space-between; align-items:center;}
button {font-size:16px;padding:10px;border-radius:8px;border:none;background:#007bff;color:white;}
.card {background:white;padding:12px;border-radius:10px;margin-top:12px;}
.done {text-decoration:line-through;color:gray;}
.task-row {display:flex;justify-content:space-between;margin:8px 0;}
.calendar {display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;}
.day {aspect-ratio:1;text-align:center;font-size:12px;border-radius:6px;}
.full {background:#4caf50;color:white;}
.partial {background:#ff9800;color:white;}
.empty {background:#ddd;}
</style>
</head>

<body>

<div class="topbar">
<h2>📘 学习进度</h2>
</div>

<div class="card">
🔥 连续学习：<b id="streak">0</b> 天
</div>

<div class="card">
<input id="taskInput" placeholder="输入任务">
<select id="categorySelect"></select>

<select id="rangeSelect">
<option value="1">今天</option>
<option value="3">最近3天</option>
<option value="7">最近7天</option>
<option value="999">每天</option>
</select>

<button onclick="addTask()">添加任务</button>
</div>

<div class="card">
<h4>📋 今日任务</h4>
<div id="taskList"></div>
</div>

<div class="card">
<h4>📅 本月学习</h4>
<div class="calendar" id="calendar"></div>
</div>

<script>
// ===== 数据 =====
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let history = JSON.parse(localStorage.getItem("history")) || {};
let categories = ["日语","编程"];

// ===== 日期 =====
function getDateStr(d){
  return d.toISOString().split("T")[0];
}

function today(){
  return getDateStr(new Date());
}

// ===== 添加任务（支持时间范围）=====
function addTask(){
  const text = document.getElementById("taskInput").value;
  const cat = document.getElementById("categorySelect").value;
  const range = parseInt(document.getElementById("rangeSelect").value);

  if(!text) return;

  for(let i=0;i<range;i++){
    const d = new Date();
    d.setDate(d.getDate()+i);

    tasks.push({
      text,
      category:cat,
      date:getDateStr(d),
      done:false
    });
  }

  save();
}

// ===== 今日任务 =====
function getTodayTasks(){
  return tasks.filter(t=>t.date===today());
}

// ===== 切换任务 =====
function toggleTask(index){
  const todayTasks = getTodayTasks();
  todayTasks[index].done = !todayTasks[index].done;
  updateHistory();
  save();
}

// ===== 更新history（核心）=====
function updateHistory(){
  const todayTasks = getTodayTasks();

  if(todayTasks.length===0) return;

  const doneCount = todayTasks.filter(t=>t.done).length;
  const ratio = doneCount / todayTasks.length;

  if(ratio===1){
    history[today()] = 1;
  }else if(ratio>0){
    history[today()] = 0.5;
  }else{
    delete history[today()];
  }
}

// ===== 渲染任务 =====
function renderTasks(){
  const list = document.getElementById("taskList");
  list.innerHTML="";

  const todayTasks = getTodayTasks();

  todayTasks.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="task-row";

    const left = document.createElement("div");

    const cb = document.createElement("input");
    cb.type="checkbox";
    cb.checked = t.done;
    cb.onclick=()=>toggleTask(i);

    const span = document.createElement("span");
    span.textContent=`[${t.category}] ${t.text}`;
    if(t.done) span.className="done";

    left.appendChild(cb);
    left.appendChild(span);

    div.appendChild(left);
    list.appendChild(div);
  });
}

// ===== streak =====
function renderStreak(){
  let count=0;
  let d=new Date();

  while(true){
    const key=getDateStr(d);
    if(history[key]){
      count++;
      d.setDate(d.getDate()-1);
    }else break;
  }

  document.getElementById("streak").textContent=count;
}

// ===== 日历（支持半完成）=====
function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const days=new Date(year,month+1,0).getDate();

  for(let i=1;i<=days;i++){
    const d=new Date(year,month,i);
    const key=getDateStr(d);

    const div=document.createElement("div");
    div.className="day";
    div.textContent=i;

    if(history[key]===1){
      div.classList.add("full");
    }else if(history[key]===0.5){
      div.classList.add("partial");
    }else{
      div.classList.add("empty");
    }

    cal.appendChild(div);
  }
}

// ===== 保存 =====
function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  localStorage.setItem("history",JSON.stringify(history));
  renderAll();
}

// ===== 渲染 =====
function renderAll(){
  renderTasks();
  renderStreak();
  renderCalendar();
}

// ===== 初始化 =====
updateHistory();
renderAll();

</script>

</body>
</html>
