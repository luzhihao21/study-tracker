<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>学习进度表 · 比例热力图</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f5f7fa;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 15px 12px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  width: 100%;
  overflow-x: auto;
}

.calendar-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -4px;
  padding: 0 4px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, minmax(44px, 1fr));
  gap: 5px;
  margin-top: 10px;
  min-width: 300px;
}

@media (max-width: 480px) {
  body {
    padding: 8px;
  }
  .card {
    padding: 12px 10px;
  }
  .calendar {
    grid-template-columns: repeat(7, minmax(38px, 1fr));
    gap: 3px;
  }
  .day {
    font-size: 12px;
  }
  .task-text {
    font-size: 14px;
  }
  .delete-task {
    padding: 4px 10px;
    font-size: 11px;
  }
  .stat-number {
    font-size: 22px;
  }
  .input-group input,
  .input-group select,
  .input-group button {
    padding: 10px;
  }
  .holiday-label {
    font-size: 6px;
    bottom: 1px;
  }
}

@media (max-width: 380px) {
  .calendar {
    grid-template-columns: repeat(7, minmax(34px, 1fr));
    gap: 2px;
  }
  .day {
    font-size: 10px;
  }
  .holiday-label {
    font-size: 5px;
  }
}

/* 热力图单元格样式 */
.day {
  aspect-ratio: 1;
  text-align: center;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
  font-weight: 600;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.day:hover {
  transform: scale(1.03);
}

/* 星期表头 */
.day.header {
  background: #d9d9d9;
  cursor: default;
  color: #444;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  box-shadow: none;
}
.day.header:hover {
  transform: none;
}

.today {
  border: 2.5px solid #2196f3;
  font-weight: bold;
  box-shadow: 0 0 0 1px white, 0 0 0 3px #2196f3;
}

.month-title {
  text-align: center;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #333;
}

/* 完成比例背景色 - 采用渐变/纯色表示密度 */
.day.ratio-0 {
  background: #eeeeee;
  color: #999;
}
.day.ratio-25 {
  background: #ffcc80;  /* 1/4 浅橙 */
  color: #5d3a1a;
}
.day.ratio-50 {
  background: #ffa726;  /* 1/2 橙 */
  color: white;
}
.day.ratio-75 {
  background: #66bb6a;  /* 3/4 浅绿 */
  color: white;
}
.day.ratio-100 {
  background: #2e7d32;  /* 全绿深绿 */
  color: white;
  font-weight: bold;
}
/* 半完成特殊处理 */
.day.ratio-partial {
  background: #ff9800;
  color: white;
}

/* 节假日粉红色背景优先级稍低但叠加显示（如果同时存在任务比例则以比例背景为主，但加粉色边框或小标志）*/
.day.holiday {
  position: relative;
}
.day.holiday::after {
  content: "🌸";
  position: absolute;
  top: 0px;
  right: 2px;
  font-size: 8px;
  opacity: 0.8;
  pointer-events: none;
}

.holiday-label {
  position: absolute;
  bottom: 2px;
  left: 0;
  right: 0;
  font-size: 7px;
  color: #b13b4a;
  font-weight: bold;
  background: rgba(255,255,200,0.8);
  border-radius: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 2px;
  pointer-events: none;
  text-align: center;
}

/* 任务列表样式 */
.task-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  padding: 8px;
  border-radius: 10px;
  background: #fefefe;
  border-bottom: 1px solid #eee;
}
.task-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.task-left input[type="checkbox"] {
  width: 20px;
  height: 20px;
  cursor: pointer;
}
.task-text {
  font-size: 15px;
  word-break: break-word;
  flex: 1;
  cursor: pointer;
}
.task-text.done {
  text-decoration: line-through;
  color: #999;
}
.delete-task {
  background: #ff4444;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 12px;
  transition: 0.1s;
}
.delete-task:hover {
  background: #cc0000;
}
.empty-tasks {
  text-align: center;
  color: #999;
  padding: 25px;
}
.input-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.input-group input {
  flex: 2;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 12px;
  font-size: 14px;
}
.input-group select {
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 12px;
}
.input-group button {
  padding: 12px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
.stats-container {
  display: flex;
  justify-content: space-around;
  text-align: center;
  gap: 10px;
}
.stat-card {
  flex: 1;
  background: #f8f9fa;
  padding: 12px;
  border-radius: 14px;
}
.stat-number {
  font-size: 28px;
  font-weight: bold;
  color: #007bff;
}
.stat-label {
  font-size: 12px;
  color: #666;
}
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}
h2 {
  margin: 0;
  font-size: 24px;
}
.settings-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
}
.settings-panel {
  position: fixed;
  top: 0;
  right: -300px;
  width: 280px;
  height: 100%;
  background: white;
  box-shadow: -2px 0 10px rgba(0,0,0,0.1);
  transition: right 0.3s ease;
  z-index: 1000;
  padding: 20px;
}
.settings-panel.show {
  right: 0;
}
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: none;
}
.overlay.show {
  display: block;
}
.close-settings {
  position: absolute;
  top: 10px;
  right: 15px;
  background: none;
  border: none;
  font-size: 24px;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  z-index: 1100;
  transition: transform 0.3s;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="header-bar">
  <h2>📘 学習進捗</h2>
  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
</div>

<div class="overlay" id="overlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" onclick="toggleSettings()">✕</button>
  <h4>⚙️ データ管理</h4>
  <button onclick="exportData()" style="background:#28a745; margin-bottom:8px; width:100%;">📤 导出备份</button>
  <button onclick="importData()" style="background:#ff9800; margin-bottom:8px; width:100%;">📥 导入备份</button>
  <button onclick="clearAllData()" style="background:#dc3545; width:100%;">🗑️ 清空所有</button>
</div>
<input type="file" id="importFile" style="display:none;" accept=".json">

<div class="card">
  <div class="month-title" id="calendarTitle"></div>
  <div class="calendar-wrapper">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div class="card">
  <h4 id="taskTitle">📋 今日のタスク</h4>
  <div id="taskList"></div>
</div>

<div class="card">
  <div class="input-group">
    <input id="taskInput" placeholder="学習タスクを入力..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="rangeSelect">
      <option value="1">今日だけ</option>
      <option value="3">3日間</option>
      <option value="7">7日間</option>
      <option value="999">毎日</option>
    </select>
    <button onclick="addTask()">追加</button>
  </div>
</div>

<div class="card">
  <div class="stats-container">
    <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">総タスク</div></div>
    <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label">完了済み</div></div>
    <div class="stat-card"><div class="stat-number" id="streak">0</div><div class="stat-label">連続学習</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 日本节假日数据 (简单版本)
const jpHolidays = {
  "2025-01-01": "元日", "2025-01-13": "成人の日", "2025-02-11": "建国記念の日", "2025-02-23": "天皇誕生日",
  "2025-03-20": "春分の日", "2025-04-29": "昭和の日", "2025-05-03": "憲法記念日", "2025-05-04": "みどりの日",
  "2025-05-05": "こどもの日", "2025-07-21": "海の日", "2025-08-11": "山の日", "2025-09-15": "敬老の日",
  "2025-09-23": "秋分の日", "2025-10-13": "スポーツの日", "2025-11-03": "文化の日", "2025-11-23": "勤労感謝の日",
  "2026-01-01": "元日", "2026-01-12": "成人の日", "2026-02-11": "建国記念の日", "2026-02-23": "天皇誕生日",
  "2026-03-20": "春分の日", "2026-04-29": "昭和の日", "2026-05-03": "憲法記念日", "2026-05-04": "みどりの日",
  "2026-05-05": "こどもの日", "2026-07-20": "海の日", "2026-08-11": "山の日", "2026-09-21": "敬老の日",
  "2026-09-23": "秋分の日", "2026-10-12": "スポーツの日", "2026-11-03": "文化の日", "2026-11-23": "勤労感謝の日"
};

function getHolidayName(dateStr) { return jpHolidays[dateStr] || null; }

let tasks = [];
let selectedDate = getDateStr(new Date());

function getDateStr(d) { return d.toISOString().split("T")[0]; }
function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }
function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('show'); document.getElementById('overlay').classList.toggle('show'); }
function saveToLocal() { localStorage.setItem('study_tracker_data', JSON.stringify({ tasks })); }
function loadFromLocal() { const saved = localStorage.getItem('study_tracker_data'); if (saved) { const data = JSON.parse(saved); tasks = data.tasks || []; } }
function exportData() { const blob = new Blob([JSON.stringify({ tasks })], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `学習記録_${getDateStr(new Date())}.json`; a.click(); showToast('エクスポート完了'); }
function importData() { document.getElementById('importFile').click(); }
function handleImport(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(ev) { const data = JSON.parse(ev.target.result); tasks = data.tasks || []; saveToLocal(); renderAll(); showToast('インポート成功'); }; reader.readAsText(file); }
function clearAllData() { if (confirm('全てのデータを削除しますか？')) { tasks = []; saveToLocal(); renderAll(); toggleSettings(); showToast('データクリア'); } }

// 计算某一天的完成比例 (返回 0, 0.25, 0.5, 0.75, 1)
function getCompletionRatio(dateStr) {
  const dayTasks = tasks.filter(t => t.date === dateStr);
  if (dayTasks.length === 0) return 0;
  const doneCount = dayTasks.filter(t => t.done).length;
  const ratio = doneCount / dayTasks.length;
  if (ratio === 0) return 0;
  if (ratio <= 0.3) return 0.25;   // 三分之一及以下 -> 1/4
  if (ratio <= 0.6) return 0.5;    // 半完成
  if (ratio < 1) return 0.75;      // 三分之二 ~ 四分之三
  return 1;
}

function addTask() {
  const text = document.getElementById("taskInput").value.trim();
  const range = parseInt(document.getElementById("rangeSelect").value);
  if (!text) { showToast("タスクを入力してください"); return; }
  for (let i = 0; i < range; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const dateStr = getDateStr(d);
    if (!tasks.some(t => t.text === text && t.date === dateStr)) {
      tasks.push({ id: Date.now() + '-' + i + '-' + Math.random(), text, date: dateStr, done: false });
    }
  }
  saveToLocal(); renderAll(); document.getElementById("taskInput").value = ''; showToast(range===999 ? '毎日タスク追加' : `${range}日間追加`);
}

function deleteTaskWithDialog(taskId) {
  const targetTask = tasks.find(t => t.id === taskId);
  if (!targetTask) return;
  const sameTextTasks = tasks.filter(t => t.text === targetTask.text).sort((a,b) => a.date.localeCompare(b.date));
  if (sameTextTasks.length <= 1) {
    tasks = tasks.filter(t => t.id !== taskId);
    saveToLocal(); renderAll(); showToast(`「${targetTask.text}」を削除`);
    return;
  }
  const futureTasks = sameTextTasks.filter(t => t.date >= targetTask.date);
  const choice = confirm(`「${targetTask.text}」\n【OK】今日以降(${futureTasks.length}件)削除\n【キャンセル】全削除選択へ`);
  if (choice) {
    tasks = tasks.filter(t => !(t.text === targetTask.text && t.date >= targetTask.date));
    saveToLocal(); renderAll(); showToast(`今日以降のタスクを削除`);
  } else {
    if (confirm(`全ての「${targetTask.text}」(${sameTextTasks.length}件)を削除しますか？`)) {
      tasks = tasks.filter(t => t.text !== targetTask.text);
      saveToLocal(); renderAll(); showToast(`全て削除しました`);
    } else showToast("キャンセル");
  }
}
function deleteTaskHandler(id) { deleteTaskWithDialog(id); }
function toggleTask(id) { const task = tasks.find(t => t.id === id); if (task) { task.done = !task.done; saveToLocal(); renderAll(); } }
function renderTasks() { const list = tasks.filter(t => t.date === selectedDate); const container = document.getElementById('taskList'); const todayStr = getDateStr(new Date()); document.getElementById('taskTitle').innerHTML = selectedDate === todayStr ? '📋 今日のタスク' : `📋 ${new Date(selectedDate).getMonth()+1}/${new Date(selectedDate).getDate()}`; if (list.length === 0) { container.innerHTML = '<div class="empty-tasks">✨ タスクがありません</div>'; return; } container.innerHTML = list.map(task => `<div class="task-item"><div class="task-left"><input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}')"><span class="task-text ${task.done ? 'done' : ''}" onclick="toggleTask('${task.id}')">${escapeHtml(task.text)}</span></div><button class="delete-task" onclick="deleteTaskHandler('${task.id}')">削除</button></div>`).join(''); }
function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
function renderStats() { document.getElementById('totalTasks').textContent = tasks.length; document.getElementById('completedTasks').textContent = tasks.filter(t => t.done).length; let streak = 0, d = new Date(); while (true) { const ratio = getCompletionRatio(getDateStr(d)); if (ratio === 1) { streak++; d.setDate(d.getDate() - 1); } else break; } document.getElementById('streak').textContent = streak; }

function renderCalendar() {
  const cal = document.getElementById('calendar'); const now = new Date(); const year = now.getFullYear(), month = now.getMonth();
  document.getElementById('calendarTitle').innerHTML = `📅 ${year}年 ${month+1}月`;
  const week = ['日', '月', '火', '水', '木', '金', '土'];
  cal.innerHTML = week.map(w => `<div class="day header">${w}</div>`).join('');
  const firstDay = new Date(year, month, 1).getDay(); const days = new Date(year, month + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) { const emptyDiv = document.createElement('div'); emptyDiv.className = 'day ratio-0'; cal.appendChild(emptyDiv); }
  for (let i = 1; i <= days; i++) {
    const d = new Date(year, month, i); const key = getDateStr(d); const ratio = getCompletionRatio(key); const holidayName = getHolidayName(key);
    const div = document.createElement('div'); div.className = 'day';
    let ratioClass = 'ratio-0'; if (ratio === 0) ratioClass = 'ratio-0'; else if (ratio === 0.25) ratioClass = 'ratio-25'; else if (ratio === 0.5) ratioClass = 'ratio-50'; else if (ratio === 0.75) ratioClass = 'ratio-75'; else if (ratio === 1) ratioClass = 'ratio-100';
    div.classList.add(ratioClass);
    div.textContent = i;
    if (holidayName) { div.classList.add('holiday'); const labelSpan = document.createElement('span'); labelSpan.className = 'holiday-label'; labelSpan.textContent = holidayName; div.appendChild(labelSpan); }
    if (key === getDateStr(new Date())) div.classList.add('today');
    div.onclick = (function(k) { return () => { selectedDate = k; renderTasks(); renderCalendar(); }; })(key);
    cal.appendChild(div);
  }
}

function renderAll() { renderCalendar(); renderTasks(); renderStats(); }

loadFromLocal();
if (tasks.length === 0) { const today = getDateStr(new Date()); tasks.push({ id: 'demo1', text: '📖 読書', date: today, done: false }, { id: 'demo2', text: '💻 プログラミング', date: today, done: false }); saveToLocal(); }
renderAll();
document.getElementById('importFile').addEventListener('change', handleImport);
</script>
</body>
</html>
