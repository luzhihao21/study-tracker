<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习进度表</title>

<style>
body {font-family: Arial;margin:15px;background:#f5f5f5;}
button {padding:10px;border:none;border-radius:8px;background:#007bff;color:#fff;}
.card {background:#fff;padding:12px;border-radius:10px;margin-top:12px;}
.done {text-decoration:line-through;color:gray;}
.task-row {display:flex;justify-content:space-between;margin:8px 0;}
</style>
</head>

<body>

<h2>📘 学习进度（调试版）</h2>

<div class="card">
  <button onclick="login()">Google登录</button>
  <button onclick="logout()">退出</button>
  <div id="user">未登录</div>
</div>

<div class="card">
🔥 连续学习：<b id="streak">0</b> 天
</div>

<div class="card">
<input id="taskInput" placeholder="输入任务">
<button onclick="addTask()">添加任务</button>
</div>

<div class="card">
<h4>📋 任务列表</h4>
<div id="taskList"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ===== Firebase =====
const firebaseConfig = {
  apiKey: "AIzaSyBJOy5FUYZ35McTPje8uQfwmL4UW0hCVjg",
  authDomain: "study-tracker-f8e6b.firebaseapp.com",
  projectId: "study-tracker-f8e6b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ⭐ 强制持久化（非常关键）
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

console.log("页面加载完成");

// ===== 登录（双保险）=====
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result => {
      console.log("✅ popup登录成功:", result.user.email);
    })
    .catch(err => {
      console.warn("⚠️ popup失败，尝试redirect:", err.message);
      return auth.signInWithRedirect(provider);
    });
}

function logout(){
  auth.signOut();
}

// ===== redirect结果 =====
auth.getRedirectResult()
  .then(result => {
    console.log("🔄 redirect结果:", result);
  })
  .catch(err => {
    console.error("❌ redirect错误:", err);
  });

// ===== 登录状态监听 =====
auth.onAuthStateChanged(user=>{
  console.log("👀 状态变化:", user);

  if(user){
    document.getElementById("user").textContent = "已登录：" + user.email;
    loadFromCloud();
  }else{
    document.getElementById("user").textContent = "未登录";
  }
});

// ===== 数据 =====
let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

// ===== 添加任务 =====
function addTask(){
  const input = document.getElementById("taskInput");
  if(!input.value) return;

  tasks.push({text: input.value});
  input.value="";
  save();
}

// ===== 渲染 =====
function render(){
  const list = document.getElementById("taskList");
  list.innerHTML="";

  tasks.forEach(t=>{
    const div = document.createElement("div");
    div.textContent = t.text;
    list.appendChild(div);
  });
}

// ===== 云 =====
function saveToCloud(){
  const user = auth.currentUser;
  if(!user) {
    console.log("⚠️ 未登录，未同步");
    return;
  }

  console.log("☁️ 同步到云:", user.uid);

  db.collection("users").doc(user.uid).set({
    tasks
  });
}

function loadFromCloud(){
  const user = auth.currentUser;
  if(!user) return;

  db.collection("users").doc(user.uid).get()
    .then(doc=>{
      console.log("📥 从云加载:", doc.data());

      if(doc.exists){
        tasks = doc.data().tasks || [];
        render();
      }
    });
}

// ===== 保存 =====
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
  saveToCloud();
  render();
}

// ===== 初始化 =====
render();

</script>

</body>
</html>
