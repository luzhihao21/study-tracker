<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>学习进度表 · 比例热力图</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f5f7fa;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 15px 12px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  width: 100%;
  overflow-x: auto;
}

.calendar-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -4px;
  padding: 0 4px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, minmax(44px, 1fr));
  gap: 5px;
  margin-top: 10px;
  min-width: 300px;
}

@media (max-width: 480px) {
  body { padding: 8px; }
  .card { padding: 12px 10px; }
  .calendar { grid-template-columns: repeat(7, minmax(38px, 1fr)); gap: 3px; }
  .day { font-size: 12px; }
  .task-text { font-size: 14px; }
  .stat-number { font-size: 22px; }
  .input-group input, .input-group select, .input-group button { padding: 10px; }
}

.day {
  aspect-ratio: 1;
  text-align: center;
  border-radius: 10px; /* 稍微减小圆角，让分割效果更明显 */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s;
  font-weight: 600;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  background: #eeeeee; /* 默认底色 */
  color: #444;
}

/* 选中日期的样式 */
.day.selected {
  outline: 2px solid #007bff;
  outline-offset: -2px;
  z-index: 1;
}

.day:hover { transform: scale(1.05); }

.day.header {
  background: #d9d9d9 !important;
  cursor: default;
  color: #444;
  font-weight: bold;
  box-shadow: none;
}
.day.header:hover { transform: none; }

.today {
  border: 2px solid #2196f3;
  font-weight: bold;
}

.month-title {
  text-align: center;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #333;
}

.day.holiday::after {
  content: "🌸";
  position: absolute;
  top: 1px;
  right: 2px;
  font-size: 8px;
  opacity: 0.8;
}

.holiday-label {
  position: absolute;
  bottom: 2px;
  left: 0;
  right: 0;
  font-size: 7px;
  color: #b13b4a;
  background: rgba(255,255,255,0.7);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

.task-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  padding: 8px;
  border-radius: 10px;
  background: #fefefe;
  border-bottom: 1px solid #eee;
}
.task-left { display: flex; align-items: center; gap: 10px; flex: 1; }
.task-left input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
.task-text { font-size: 15px; word-break: break-word; flex: 1; cursor: pointer; }
.task-text.done { text-decoration: line-through; color: #999; }
.delete-task { background: #ff4444; color: white; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 12px; }

.input-group { display: flex; gap: 8px; flex-wrap: wrap; }
.input-group input { flex: 2; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
.input-group select { padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
.input-group button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 12px; }

.stats-container { display: flex; justify-content: space-around; text-align: center; gap: 10px; }
.stat-card { flex: 1; background: #f8f9fa; padding: 12px; border-radius: 14px; }
.stat-number { font-size: 28px; font-weight: bold; color: #007bff; }
.stat-label { font-size: 12px; color: #666; }

.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.settings-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); transition: right 0.3s; z-index: 1000; padding: 20px; }
.settings-panel.show { right: 0; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
.overlay.show { display: block; }
.lang-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; background: #f0f0f0; border: none; border-radius: 10px; cursor: pointer; }
.lang-btn.active { background: #007bff; color: white; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 30px; z-index: 1100; transition: transform 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header-bar">
  <h2 id="appTitle">📘 学习进度</h2>
  <button onclick="toggleSettings()" style="background:none; border:none; font-size:24px;">⚙️</button>
</div>

<div class="overlay" id="overlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <button onclick="toggleSettings()" style="float:right; background:none; border:none; font-size:20px;">✕</button>
  <h4 id="settingsTitle">⚙️ 设置</h4>
  <div class="language-selector">
    <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">🇨🇳 中文</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇬🇧 English</button>
    <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja')">🇯🇵 日本語</button>
  </div>
  <button onclick="exportData()" id="exportBtn" style="background:#28a745; color:white; border:none; padding:10px; width:100%; border-radius:10px; margin-bottom:8px;">📤 导出备份</button>
  <button onclick="importData()" id="importBtn" style="background:#ff9800; color:white; border:none; padding:10px; width:100%; border-radius:10px; margin-bottom:8px;">📥 导入备份</button>
  <button onclick="clearAllData()" id="clearBtn" style="background:#dc3545; color:white; border:none; padding:10px; width:100%; border-radius:10px;">🗑️ 清空所有</button>
</div>
<input type="file" id="importFile" style="display:none;" accept=".json">

<div class="card">
  <div class="month-title" id="calendarTitle"></div>
  <div class="calendar-wrapper">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div class="card">
  <h4 id="taskTitle">📋 今日任务</h4>
  <div id="taskList"></div>
</div>

<div class="card">
  <div class="input-group">
    <input id="taskInput" placeholder="输入学习任务..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="rangeSelect">
      <option value="1">今天</option>
      <option value="3">最近3天</option>
      <option value="7">最近7天</option>
      <option value="999">每天</option>
    </select>
    <button onclick="addTask()" id="addBtn">添加</button>
  </div>
</div>

<div class="card">
  <div class="stats-container">
    <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label" id="totalLabel">总任务</div></div>
    <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label" id="completedLabel">已完成</div></div>
    <div class="stat-card"><div class="stat-number" id="streak">0</div><div class="stat-label" id="streakLabel">连续学习</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ======================== 数据与配置 ========================
const jpHolidays = {
  "2025-01-01": "元日", "2025-01-13": "成人の日", "2025-02-11": "建国記念の日", "2025-02-23": "天皇誕生日",
  "2025-03-20": "春分の日", "2025-04-29": "昭和の日", "2025-05-03": "憲法記念日", "2025-05-04": "みどりの日",
  "2025-05-05": "こどもの日", "2025-07-21": "海の日", "2025-08-11": "山の日", "2025-09-15": "敬老の日",
  "2025-09-23": "秋分の日", "2025-10-13": "スポーツの日", "2025-11-03": "文化の日", "2025-11-23": "勤劳感謝の日",
  "2026-05-05": "こどもの日" // 确保包含当前年份
};

const locales = {
  zh: { appTitle: "📘 学习进度", calendarMonth: "📅 {year}年 {month}月", weekDays: ["日", "一", "二", "三", "四", "五", "六"], taskToday: "📋 今日任务", taskOther: "📋 {month}月{day}日任务", totalLabel: "总任务", completedLabel: "已完成", streakLabel: "连续学习", emptyTasks: "✨ 暂无任务", addSuccess: (r)=>`已添加${r==999?'每天':r+'天'}任务` },
  en: { appTitle: "📘 Study Tracker", calendarMonth: "📅 {year}/{month}", weekDays: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"], taskToday: "📋 Today", taskOther: "📋 {month}/{day}", totalLabel: "Total", completedLabel: "Done", streakLabel: "Streak", emptyTasks: "✨ No tasks", addSuccess: (r)=>"Task Added" },
  ja: { appTitle: "📘 学習進捗", calendarMonth: "📅 {year}年 {month}月", weekDays: ["日", "月", "火", "水", "木", "金", "土"], taskToday: "📋 今日", taskOther: "📋 {month}月{day}日", totalLabel: "総数", completedLabel: "完了", streakLabel: "継続", emptyTasks: "✨ タスクなし", addSuccess: (r)=>"追加しました" }
};

let currentLang = 'zh';
let tasks = [];
let selectedDate = new Date().toISOString().split("T")[0];

// ======================== 核心逻辑修复 ========================

function renderCalendar() {
  const cal = document.getElementById('calendar');
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const t = locales[currentLang];
  
  document.getElementById('calendarTitle').innerHTML = t.calendarMonth.replace('{year}', year).replace('{month}', month+1);
  cal.innerHTML = t.weekDays.map(w => `<div class="day header">${w}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'day header'; // 占位符
    emptyDiv.style.background = "transparent";
    cal.appendChild(emptyDiv);
  }

  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    const dateStr = d.toISOString().split("T")[0];
    const dayTasks = tasks.filter(tk => tk.date === dateStr);
    const doneCount = dayTasks.filter(tk => tk.done).length;
    
    // 【修改点 2】：实现方块分割效果 (使用线性渐变)
    let fillPercent = 0;
    if (dayTasks.length > 0) {
      fillPercent = (doneCount / dayTasks.length) * 100;
    }

    const div = document.createElement('div');
    div.className = 'day';
    if (dateStr === selectedDate) div.classList.add('selected');
    if (dateStr === new Date().toISOString().split("T")[0]) div.classList.add('today');
    
    // 渐变效果：从下往上填满绿色。#66bb6a 是任务完成的绿色，#eeeeee 是背景灰色
    div.style.background = `linear-gradient(to top, #66bb6a ${fillPercent}%, #eeeeee ${fillPercent}%)`;
    // 如果完成度很高，改变文字颜色
    if (fillPercent > 50) div.style.color = "white";

    div.textContent = i;

    // 节假日处理
    const holidayName = jpHolidays[dateStr];
    if (holidayName) {
      div.classList.add('holiday');
      const label = document.createElement('span');
      label.className = 'holiday-label';
      label.textContent = holidayName;
      div.appendChild(label);
    }

    // 【修改点 1】：点击事件确保 selectedDate 同步更新并重新渲染
    div.onclick = () => {
      selectedDate = dateStr;
      renderAll(); 
    };

    cal.appendChild(div);
  }
}

function renderTasks() {
  const container = document.getElementById('taskList');
  const t = locales[currentLang];
  const dayTasks = tasks.filter(tk => tk.date === selectedDate);
  
  // 更新标题日期
  const d = new Date(selectedDate);
  const todayStr = new Date().toISOString().split("T")[0];
  if (selectedDate === todayStr) {
    document.getElementById('taskTitle').innerText = t.taskToday;
  } else {
    document.getElementById('taskTitle').innerText = t.taskOther.replace('{month}', d.getMonth()+1).replace('{day}', d.getDate());
  }

  if (dayTasks.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:#999;padding:20px;">${t.emptyTasks}</div>`;
    return;
  }

  container.innerHTML = dayTasks.map(task => `
    <div class="task-item">
      <div class="task-left">
        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}')">
        <span class="task-text ${task.done ? 'done' : ''}" onclick="toggleTask('${task.id}')">${task.text}</span>
      </div>
      <button class="delete-task" onclick="deleteTask('${task.id}')">删除</button>
    </div>
  `).join('');
}

// ======================== 其他辅助功能 ========================

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  const range = parseInt(document.getElementById('rangeSelect').value);
  if (!text) return;

  const baseDate = new Date(selectedDate); // 基于当前选中的日期添加
  for (let i = 0; i < (range === 999 ? 30 : range); i++) {
    const d = new Date(baseDate);
    d.setDate(d.getDate() + i);
    const dStr = d.toISOString().split("T")[0];
    tasks.push({ id: Date.now() + Math.random(), text, date: dStr, done: false });
  }
  input.value = '';
  saveToLocal();
  renderAll();
  showToast(locales[currentLang].addSuccess(range));
}

function toggleTask(id) {
  const task = tasks.find(tk => tk.id == id);
  if (task) task.done = !task.done;
  saveToLocal();
  renderAll();
}

function deleteTask(id) {
  tasks = tasks.filter(tk => tk.id != id);
  saveToLocal();
  renderAll();
}

function renderStats() {
  document.getElementById('totalTasks').innerText = tasks.length;
  document.getElementById('completedTasks').innerText = tasks.filter(tk => tk.done).length;
  
  // 简单连续学习算法（全完成的天数）
  let streak = 0;
  let d = new Date();
  while(true) {
    const dStr = d.toISOString().split("T")[0];
    const dayTasks = tasks.filter(tk => tk.date === dStr);
    if (dayTasks.length > 0 && dayTasks.every(tk => tk.done)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  document.getElementById('streak').innerText = streak;
}

function renderAll() {
  renderCalendar();
  renderTasks();
  renderStats();
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('show');
  document.getElementById('overlay').classList.toggle('show');
}

function setLanguage(lang) {
  currentLang = lang;
  saveToLocal();
  location.reload();
}

function saveToLocal() { localStorage.setItem('study_tracker_v2', JSON.stringify({tasks, currentLang})); }
function loadFromLocal() {
  const data = JSON.parse(localStorage.getItem('study_tracker_v2'));
  if (data) {
    tasks = data.tasks || [];
    currentLang = data.currentLang || 'zh';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function exportData() {
  const blob = new Blob([JSON.stringify(tasks)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'study_backup.json';
  a.click();
}

function importData() { document.getElementById('importFile').click(); }
document.getElementById('importFile').onchange = (e) => {
  const reader = new FileReader();
  reader.onload = (ev) => {
    tasks = JSON.parse(ev.target.result);
    saveToLocal(); renderAll();
  };
  reader.readAsText(e.target.files[0]);
};

function clearAllData() { if(confirm("确定清空吗？")) { tasks = []; saveToLocal(); renderAll(); } }

// 初始化
loadFromLocal();
renderAll();
</script>
</body>
</html>
