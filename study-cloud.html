<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习进度表</title>

<style>
body {font-family: Arial;margin:15px;background:#f5f5f5;}
button {padding:10px;border:none;border-radius:8px;background:#007bff;color:#fff;}
.card {background:#fff;padding:12px;border-radius:10px;margin-top:12px;}
.done {text-decoration:line-through;color:gray;}
.task-row {display:flex;justify-content:space-between;margin:8px 0;}
</style>
</head>

<body>

<h2>📘 学习进度（云同步版）</h2>

<div class="card">
  <div id="user">连接中...</div>
</div>

<div class="card">
<input id="taskInput" placeholder="输入任务">
<button onclick="addTask()">添加任务</button>
</div>

<div class="card">
<h4>📋 任务列表</h4>
<div id="taskList"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBJOy5FUYZ35McTPje8uQfwmL4UW0hCVjg",
  authDomain: "study-tracker-f8e6b.firebaseapp.com",
  projectId: "study-tracker-f8e6b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ===== 本地缓存（双保险）=====
let tasks =
  JSON.parse(localStorage.getItem("tasks") || "null") ||
  [];

// ===== 匿名登录 =====
auth.signInAnonymously()
  .then(()=> console.log("匿名登录成功"))
  .catch(err=> console.error(err));

// ===== 状态监听 =====
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").textContent = "已连接云端";
    loadFromCloud();
  }else{
    document.getElementById("user").textContent = "未连接";
  }
});

// ===== 云读取 =====
function loadFromCloud(){
  const user = auth.currentUser;
  if(!user) return;

  db.collection("users").doc(user.uid).get()
    .then(doc=>{
      if(doc.exists){
        tasks = doc.data().tasks || [];
        render();
      }
    });
}

// ===== 云保存 =====
function saveToCloud(){
  const user = auth.currentUser;
  if(!user) return;

  db.collection("users").doc(user.uid).set({
    tasks
  });
}

// ===== 添加任务 =====
function addTask(){
  const input = document.getElementById("taskInput");
  if(!input.value) return;

  tasks.push({text: input.value});
  input.value="";
  save();
}

// ===== 保存 =====
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
  saveToCloud();
  render();
}

// ===== 渲染 =====
function render(){
  const list = document.getElementById("taskList");
  list.innerHTML="";

  tasks.forEach(t=>{
    const div = document.createElement("div");
    div.textContent = t.text;
    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
