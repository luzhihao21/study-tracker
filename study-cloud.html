<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>学习进度表（云端版）</title>

<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; padding: 12px; background: #f5f7fa; min-height: 100vh; }

.card { background: white; padding: 15px 12px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); width: 100%; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }

h2 { margin: 0; font-size: 22px; }

.lang-btn { background: #007bff; border: none; padding: 8px 16px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; }

.settings-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px 8px; border-radius: 50%; }

.calendar-wrapper { overflow-x: auto; margin: 0 -4px; padding: 0 4px; }

.calendar { 
  display: grid; 
  grid-template-columns: repeat(7, minmax(42px, 1fr)); 
  gap: 5px; 
  margin-top: 10px; 
  min-width: 280px;
  justify-items: center;
}

.day { 
  aspect-ratio: 1; 
  text-align: center; 
  font-size: 13px; 
  border-radius: 10px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  cursor: pointer; 
  font-weight: 500; 
}

.day.header { 
  background: #e0e0e0; 
  cursor: default; 
  display: flex;
  align-items: center;
  justify-content: center;
}

.full { background: #4caf50; color: white; }
.partial { background: #ff9800; color: white; }
.empty { background: #e8e8e8; color: #666; }
.today { border: 2px solid #2196f3; font-weight: bold; }

.holiday {
  background: #ffebee;
  color: #d32f2f;
  font-weight: bold;
}

.month-title { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 10px; }

.task-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; padding: 8px; border-radius: 10px; }

.task-left { display: flex; align-items: center; gap: 10px; flex: 1; }

.task-left input { width: 20px; height: 20px; cursor: pointer; }

.task-text { font-size: 15px; word-break: break-word; flex: 1; cursor: pointer; }

.task-text.done { text-decoration: line-through; color: #999; }

.delete-task { background: #ff4444; color: white; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; }

.empty-tasks { text-align: center; color: #999; padding: 25px; }

.input-group { display: flex; gap: 8px; flex-wrap: wrap; }

.input-group input { flex: 2; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }

.input-group select { padding: 12px; border: 1px solid #ddd; border-radius: 12px; }

.input-group button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 12px; cursor: pointer; }

.stats-container { display: flex; justify-content: space-around; gap: 10px; }

.stat-card { flex: 1; background: #f8f9fa; padding: 12px; border-radius: 14px; text-align: center; }

.stat-number { font-size: 28px; font-weight: bold; color: #007bff; }

.stat-label { font-size: 12px; color: #666; }

.settings-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); transition: right 0.3s; z-index: 1000; padding: 20px; }

.settings-panel.show { right: 0; }

.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }

.overlay.show { display: block; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 30px; z-index: 1100; transition: 0.3s; }

.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<body>

<div class="header">
  <h2 id="appTitle">📘 学习进度表（云端版）</h2>
  <div>
    <button class="lang-btn" onclick="toggleLanguage()">日本語</button>
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSettings()"></div>

<div class="card">
  <div class="month-title" id="calendarTitle"></div>
  <div class="calendar-wrapper">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div class="card">
  <h4 id="taskTitle">📋 今日任务</h4>
  <div id="taskList"></div>
</div>

<div class="card">
  <div class="input-group">
    <input id="taskInput" placeholder="输入学习任务..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="rangeSelect">
      <option value="1">今天</option>
      <option value="3">最近3天</option>
      <option value="7">最近7天</option>
    </select>
    <button onclick="addTask()">添加</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const API_BASE = 'http://localhost:8080/api/tasks';

let tasks = [];
let history = {};
let holidays = {};
let selectedDate = getDateStr(new Date());
let currentLang = 'zh';

function getDateStr(d){
  return d.toISOString().split('T')[0];
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

async function loadHolidays(){
  const res = await fetch('https://holidays-jp.github.io/api/v1/date.json');
  holidays = await res.json();
}

async function loadTasksFromCloud(){
  const res = await fetch(`${API_BASE}/all`);
  tasks = await res.json();

  history = {};
  tasks.forEach(t=>{
    if(!history[t.date]) history[t.date]={total:0,done:0};
    history[t.date].total++;
    if(t.done) history[t.date].done++;
  });

  renderAll();
}

async function addTask(){
  const text = document.getElementById('taskInput').value.trim();
  const range = +document.getElementById('rangeSelect').value;

  if(!text) return;

  const groupId = Date.now();

  const base = new Date();

  for(let i=0;i<range;i++){
    const d = new Date(base);
    d.setDate(base.getDate()+i);

    await fetch(API_BASE,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        text,
        date:getDateStr(d),
        done:false,
        groupId
      })
    });
  }

  await loadTasksFromCloud();
  showToast('添加成功');
}

async function toggleTask(id){
  await fetch(`${API_BASE}/${id}/toggle`,{method:'PUT'});
  await loadTasksFromCloud();
}

async function deleteTask(id){

  const task = tasks.find(t=>t.id===id);
  if(!task) return;

  const mode = confirm('删除任务？\n确定=删除整个任务\n取消=只删除当天');

  if(mode){
    const gid = task.groupId;
    const list = tasks.filter(t=>t.groupId===gid);
    for(const t of list){
      await fetch(`${API_BASE}/${t.id}`,{method:'DELETE'});
    }
  }else{
    await fetch(`${API_BASE}/${id}`,{method:'DELETE'});
  }

  await loadTasksFromCloud();
}

function renderTasks(){
  const list = tasks.filter(t=>t.date===selectedDate);

  const el = document.getElementById('taskList');

  if(list.length===0){
    el.innerHTML = '暂无任务';
    return;
  }

  el.innerHTML = list.map(t=>`
    <div class="task-item">
      <div class="task-left">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
        <span onclick="toggleTask(${t.id})">${t.text}</span>
      </div>
      <button onclick="deleteTask(${t.id})">删除</button>
    </div>
  `).join('');
}

function renderCalendar(){
  const cal = document.getElementById('calendar');
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();

  document.getElementById('calendarTitle').innerText = `${y}-${m+1}`;

  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();

  cal.innerHTML = '';

  const week = ['日','一','二','三','四','五','六'];

  week.forEach(w=>{
    const d=document.createElement('div');
    d.className='day header';
    d.innerText=w;
    cal.appendChild(d);
  });

  for(let i=0;i<first;i++){
    cal.appendChild(document.createElement('div'));
  }

  for(let i=1;i<=days;i++){
    const d=new Date(y,m,i);
    const key=getDateStr(d);

    const div=document.createElement('div');

    const isHoliday = holidays[key];

    div.className='day '+
      (isHoliday?'holiday ':'')+
      (history[key]?.done===history[key]?.total?'full':'empty');

    div.innerText=i;
    div.onclick=()=>{selectedDate=key;renderTasks();};

    cal.appendChild(div);
  }
}

function renderAll(){
  renderCalendar();
  renderTasks();
}

async function init(){
  await loadHolidays();
  await loadTasksFromCloud();
}

init();

</script>
</body>
</html>
