<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>学习进度表（云端版）</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; padding: 12px; background: #f5f7fa; min-height: 100vh; }
.card { background: white; padding: 15px 12px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); width: 100%; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
h2 { margin: 0; font-size: 22px; }
.lang-btn { background: #007bff; border: none; padding: 8px 16px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; }
.settings-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px 8px; border-radius: 50%; }
.calendar-wrapper { overflow-x: auto; margin: 0 -4px; padding: 0 4px; }
.calendar { display: grid; grid-template-columns: repeat(7, minmax(42px, 1fr)); gap: 5px; margin-top: 10px; min-width: 280px; }

/* ② 修复：星期头居中 */
.day {
  aspect-ratio: 1;
  text-align: center;
  font-size: 13px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;  /* 关键：水平居中 */
  cursor: pointer;
  font-weight: 500;
  width: 100%;
}
.day.header { background: #e0e0e0; cursor: default; }
.full { background: #4caf50; color: white; }
.partial { background: #ff9800; color: white; }
.empty { background: #e8e8e8; color: #666; }
.today { border: 2px solid #2196f3; font-weight: bold; }

/* ① 日本节假日专属样式 */
.holiday {
  background: #f8bbd0 !important;
  color: #c2185b !important;
  position: relative;
}
.holiday::after {
  content: '祝';
  position: absolute;
  bottom: 1px;
  right: 2px;
  font-size: 8px;
  opacity: 0.7;
}
.holiday.full { background: #e91e63 !important; color: white !important; }
.holiday.partial { background: #f06292 !important; color: white !important; }
/* 节假日 + 今日边框 */
.holiday.today { border: 2px solid #c2185b; }

/* 节假日图例 */
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 4px; }

.month-title { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
@media (max-width: 480px) { .calendar { grid-template-columns: repeat(7, minmax(38px, 1fr)); gap: 3px; } .day { font-size: 11px; } }
.task-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; padding: 8px; border-radius: 10px; }
.task-left { display: flex; align-items: center; gap: 10px; flex: 1; }
.task-left input { width: 20px; height: 20px; cursor: pointer; }
.task-text { font-size: 15px; word-break: break-word; flex: 1; cursor: pointer; }
.task-text.done { text-decoration: line-through; color: #999; }
.delete-task { background: #ff4444; color: white; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; flex-shrink: 0; }
.empty-tasks { text-align: center; color: #999; padding: 25px; }
.input-group { display: flex; gap: 8px; flex-wrap: wrap; }
.input-group input { flex: 2; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
.input-group select { padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
.input-group button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 12px; cursor: pointer; }
.stats-container { display: flex; justify-content: space-around; gap: 10px; }
.stat-card { flex: 1; background: #f8f9fa; padding: 12px; border-radius: 14px; text-align: center; }
.stat-number { font-size: 28px; font-weight: bold; color: #007bff; }
.stat-label { font-size: 12px; color: #666; }
.settings-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); transition: right 0.3s; z-index: 1000; padding: 20px; }
.settings-panel.show { right: 0; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
.overlay.show { display: block; }
.close-settings { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 24px; cursor: pointer; }
.settings-panel button { width: 100%; margin: 8px 0; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 30px; z-index: 1100; transition: transform 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ③ 删除确认弹窗 */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-box {
  background: white; border-radius: 16px; padding: 24px;
  max-width: 320px; width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal-box h3 { margin: 0 0 8px; font-size: 17px; }
.modal-box p { margin: 0 0 20px; font-size: 14px; color: #555; line-height: 1.5; }
.modal-actions { display: flex; flex-direction: column; gap: 10px; }
.modal-actions button {
  padding: 13px; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-today-forward { background: #ff9800; color: white; }
.btn-all { background: #f44336; color: white; }
.btn-cancel { background: #eee; color: #333; }
</style>
</head>
<body>

<div class="header">
  <h2 id="appTitle">📘 学习进度表（云端版）</h2>
  <div>
    <button class="lang-btn" onclick="toggleLanguage()">日本語</button>
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" onclick="toggleSettings()">✕</button>
  <h4>⚙️ 数据管理</h4>
  <button onclick="exportData()" style="background:#28a745;color:white;">📤 导出备份</button>
  <button onclick="importData()" style="background:#ff9800;color:white;">📥 导入备份</button>
  <button onclick="clearAllData()" style="background:#dc3545;color:white;">🗑️ 清空所有</button>
  <div style="margin-top: 20px; font-size: 12px; color: #999; text-align: center;">☁️ 数据已保存到云端数据库</div>
</div>
<input type="file" id="importFile" style="display:none;" accept=".json">

<div class="card">
  <div class="month-title" id="calendarTitle"></div>
  <div class="calendar-wrapper">
    <div class="calendar" id="calendar"></div>
  </div>
  <!-- ① 节假日图例 -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4caf50;"></div><span>全部完成</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff9800;"></div><span>部分完成</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f8bbd0; border:1px solid #f48fb1;"></div><span>日本祝日</span></div>
  </div>
</div>

<div class="card">
  <h4 id="taskTitle">📋 今日任务</h4>
  <div id="taskList"></div>
</div>

<div class="card">
  <div class="input-group">
    <input id="taskInput" placeholder="输入学习任务..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="rangeSelect">
      <option value="1">今天</option>
      <option value="3">最近3天</option>
      <option value="7">最近7天</option>
      <option value="999">每天</option>
    </select>
    <button onclick="addTask()">添加</button>
  </div>
</div>

<div class="card">
  <div class="stats-container">
    <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">总任务</div></div>
    <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label">已完成</div></div>
    <div class="stat-card"><div class="stat-number" id="streak">0</div><div class="stat-label">连续学习</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'http://localhost:8080/api/tasks';

let tasks = [];
let history = {};
let selectedDate = getDateStr(new Date());
let currentLang = 'zh';

// ① 日本2025年法定节假日（含振替休日）
const JAPAN_HOLIDAYS = {
  '2025-01-01': '元日',
  '2025-01-13': '成人の日',
  '2025-02-11': '建国記念の日',
  '2025-02-23': '天皇誕生日',
  '2025-02-24': '天皇誕生日（振替）',
  '2025-03-20': '春分の日',
  '2025-04-29': '昭和の日',
  '2025-05-03': '憲法記念日',
  '2025-05-04': 'みどりの日',
  '2025-05-05': 'こどもの日',
  '2025-05-06': 'こどもの日（振替）',
  '2025-07-21': '海の日',
  '2025-08-11': '山の日',
  '2025-09-15': '敬老の日',
  '2025-09-23': '秋分の日',
  '2025-10-13': 'スポーツの日',
  '2025-11-03': '文化の日',
  '2025-11-23': '勤労感謝の日',
  '2025-11-24': '勤労感謝の日（振替）',
  // 2026年も追加
  '2026-01-01': '元日',
  '2026-01-12': '成人の日',
  '2026-02-11': '建国記念の日',
  '2026-02-23': '天皇誕生日',
  '2026-03-20': '春分の日',
  '2026-04-29': '昭和の日',
  '2026-05-03': '憲法記念日',
  '2026-05-04': 'みどりの日',
  '2026-05-05': 'こどもの日',
  '2026-05-06': 'こどもの日（振替）',
  '2026-07-20': '海の日',
  '2026-08-11': '山の日',
  '2026-09-21': '敬老の日',
  '2026-09-22': '国民の休日',
  '2026-09-23': '秋分の日',
  '2026-10-12': 'スポーツの日',
  '2026-11-03': '文化の日',
  '2026-11-23': '勤労感謝の日',
};

const lang = {
  zh: {
    appTitle: '📘 学习进度表（云端版）',
    weekDays: ['日', '一', '二', '三', '四', '五', '六'],
    noTasks: '✨ 暂无任务，点击上方"添加任务"'
  },
  ja: {
    appTitle: '📘 学習進捗トラッカー（クラウド版）',
    weekDays: ['日', '月', '火', '水', '木', '金', '土'],
    noTasks: '✨ タスクがありません、「追加」をクリック'
  }
};

function getDateStr(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('show');
  document.getElementById('overlay').classList.toggle('show');
}

function toggleLanguage() {
  currentLang = currentLang === 'zh' ? 'ja' : 'zh';
  document.getElementById('appTitle').textContent = lang[currentLang].appTitle;
  document.querySelector('.lang-btn').textContent = currentLang === 'zh' ? '日本語' : '中文';
  renderCalendar();
  renderTasks();
}

async function loadTasksFromCloud() {
  try {
    const allRes = await fetch(`${API_BASE}/all`);
    const allTasks = await allRes.json();
    tasks = allTasks;

    history = {};
    tasks.forEach(task => {
      const date = task.date;
      if (!history[date]) history[date] = { total: 0, done: 0 };
      history[date].total++;
      if (task.done) history[date].done++;
    });

    const newHistory = {};
    for (const [date, stats] of Object.entries(history)) {
      const ratio = stats.done / stats.total;
      if (ratio === 1) newHistory[date] = 1;
      else if (ratio > 0) newHistory[date] = 0.5;
    }
    history = newHistory;

    renderAll();
    console.log('✅ 从云端加载成功，任务数:', tasks.length);
  } catch (err) {
    console.error('加载失败:', err);
    showToast('连接后端失败，请确认后端已启动');
  }
}

async function addTaskToCloud(text, date, done = false) {
  const res = await fetch(API_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, date, done })
  });
  return res.json();
}

async function toggleTaskInCloud(id) {
  await fetch(`${API_BASE}/${id}/toggle`, { method: 'PUT' });
}

async function deleteTaskInCloud(id) {
  await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
}

async function addTask() {
  const text = document.getElementById('taskInput').value.trim();
  const range = parseInt(document.getElementById('rangeSelect').value, 10);

  if (!text) {
    showToast('请输入任务内容');
    return;
  }

  let added = 0;
  const baseDate = new Date();

  for (let i = 0; i < range; i++) {
    const d = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate() + i);
    const dateStr = getDateStr(d);
    const exists = tasks.some(t => t.text === text && t.date === dateStr);

    if (!exists) {
      await addTaskToCloud(text, dateStr, false);
      added++;
    }
  }

  if (added > 0) {
    await loadTasksFromCloud();
    document.getElementById('taskInput').value = '';
    showToast(`✅ 添加了 ${added} 个任务`);
  } else {
    showToast('任务已存在');
  }
}

// ③ 显示删除确认弹窗，返回用户选择的 Promise
function showDeleteModal(taskText) {
  return new Promise((resolve) => {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-box">
        <h3>🗑️ 删除任务</h3>
        <p>「${escapeHtml(taskText)}」<br>请选择删除范围：</p>
        <div class="modal-actions">
          <button class="btn-today-forward">仅删除今天及以后</button>
          <button class="btn-all">删除所有日期（含已打卡）</button>
          <button class="btn-cancel">取消</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    modal.querySelector('.btn-today-forward').onclick = () => {
      document.body.removeChild(modal);
      resolve('forward');
    };
    modal.querySelector('.btn-all').onclick = () => {
      document.body.removeChild(modal);
      resolve('all');
    };
    modal.querySelector('.btn-cancel').onclick = () => {
      document.body.removeChild(modal);
      resolve('cancel');
    };
  });
}

async function deleteTask(id) {
  // 找到这个任务的文本
  const task = tasks.find(t => t.id === id);
  if (!task) return;

  // 找到同名任务中是否有多个日期
  const sameName = tasks.filter(t => t.text === task.text);

  if (sameName.length <= 1) {
    // 只有一条记录，直接删除
    await deleteTaskInCloud(id);
    await loadTasksFromCloud();
    return;
  }

  // 多条记录，弹窗询问
  const choice = await showDeleteModal(task.text);
  if (choice === 'cancel') return;

  if (choice === 'forward') {
    // 仅删除当前选中日期及之后的同名任务（保留已过去的打卡记录）
    const cutoff = selectedDate;
    const toDelete = sameName.filter(t => t.date >= cutoff);
    for (const t of toDelete) {
      await deleteTaskInCloud(t.id);
    }
    showToast(`已删除 ${toDelete.length} 条记录（保留历史打卡）`);
  } else if (choice === 'all') {
    // 删除所有同名任务（含历史）
    for (const t of sameName) {
      await deleteTaskInCloud(t.id);
    }
    showToast(`已删除全部 ${sameName.length} 条记录`);
  }

  await loadTasksFromCloud();
}

async function toggleTask(id, currentDone) {
  await toggleTaskInCloud(id);
  await loadTasksFromCloud();
}

function getTasksByDate(date) {
  return tasks.filter(t => t.date === date);
}

function renderTasks() {
  const list = getTasksByDate(selectedDate);
  const container = document.getElementById('taskList');
  const todayStr = getDateStr(new Date());

  if (selectedDate === todayStr) {
    document.getElementById('taskTitle').innerHTML = '📋 今日任务';
  } else {
    const [year, month, day] = selectedDate.split('-');
    document.getElementById('taskTitle').innerHTML = `📋 ${Number(month)}月${Number(day)}日任务`;
  }

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-tasks">${lang[currentLang].noTasks}</div>`;
    return;
  }

  container.innerHTML = list.map(task => `
    <div class="task-item">
      <div class="task-left">
        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id}, ${task.done})">
        <span class="task-text ${task.done ? 'done' : ''}" onclick="toggleTask(${task.id}, ${task.done})">${escapeHtml(task.text)}</span>
      </div>
      <button class="delete-task" onclick="deleteTask(${task.id})">删除</button>
    </div>
  `).join('');
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderStats() {
  document.getElementById('totalTasks').textContent = tasks.length;
  document.getElementById('completedTasks').textContent = tasks.filter(t => t.done).length;

  let streak = 0;
  const today = new Date();
  let d = new Date(today.getFullYear(), today.getMonth(), today.getDate());

  while (history[getDateStr(d)] === 1) {
    streak++;
    d.setDate(d.getDate() - 1);
  }

  document.getElementById('streak').textContent = streak;
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById('calendarTitle').innerHTML = `📅 ${year}年 ${month + 1}月`;

  const weekDays = lang[currentLang].weekDays;
  // ② 星期头：用 display:flex + justify-content:center 已在CSS里修好，这里直接渲染
  cal.innerHTML = weekDays.map(w => `<div class="day header">${w}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    cal.appendChild(document.createElement('div'));
  }

  const todayStr = getDateStr(new Date());

  for (let i = 1; i <= days; i++) {
    const d = new Date(year, month, i);
    const key = getDateStr(d);
    const div = document.createElement('div');
    const isHoliday = !!JAPAN_HOLIDAYS[key];

    // ① 节假日额外加 holiday class
    let cls = `day ${history[key] === 1 ? 'full' : history[key] === 0.5 ? 'partial' : 'empty'}`;
    if (isHoliday) cls += ' holiday';
    if (key === todayStr) cls += ' today';

    div.className = cls;
    div.textContent = i;

    // ① 节假日显示 tooltip（手机长按 or PC hover 可见）
    if (isHoliday) {
      div.title = JAPAN_HOLIDAYS[key];
    }

    div.onclick = function() {
      selectedDate = key;
      renderTasks();
    };

    cal.appendChild(div);
  }
}

function renderAll() {
  renderCalendar();
  renderTasks();
  renderStats();
}

function exportData() {
  const data = {
    tasks,
    history,
    exportDate: new Date().toISOString()
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);
  a.download = `学習記録_${getDateStr(new Date())}.json`;
  a.click();

  showToast('✅ 备份已导出');
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(ev) {
    try {
      const data = JSON.parse(ev.target.result);

      for (const task of tasks) {
        await deleteTaskInCloud(task.id);
      }

      for (const task of (data.tasks || [])) {
        await addTaskToCloud(task.text, task.date, task.done);
      }

      await loadTasksFromCloud();
      showToast('✅ 导入成功！');
    } catch (err) {
      showToast('❌ 文件格式错误');
    }
  };

  reader.readAsText(file);
  document.getElementById('importFile').value = '';
}

async function clearAllData() {
  if (confirm('⚠️ 确定要清空所有学习记录吗？')) {
    for (const task of tasks) {
      await deleteTaskInCloud(task.id);
    }

    await loadTasksFromCloud();
    toggleSettings();
    showToast('已清空');
  }
}

loadTasksFromCloud();
document.getElementById('importFile').addEventListener('change', handleImport);

window.toggleLanguage = toggleLanguage;
window.toggleSettings = toggleSettings;
window.addTask = addTask;
window.deleteTask = deleteTask;
window.toggleTask = toggleTask;
window.exportData = exportData;
window.importData = importData;
window.clearAllData = clearAllData;
</script>
</body>
</html>
